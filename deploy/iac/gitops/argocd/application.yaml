apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trstctl-resources
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ctlplne/trstctl.git
    targetRevision: main
    path: deploy/iac/gitops/base
  destination:
    server: https://kubernetes.default.svc
    namespace: trstctl-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
