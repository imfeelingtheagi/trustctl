apiVersion: batch/v1
kind: Job
metadata:
  name: trstctl-terraform-apply
  namespace: trstctl-system
  labels:
    app.kubernetes.io/name: trstctl
    app.kubernetes.io/component: iac
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trstctl
        app.kubernetes.io/component: iac
    spec:
      restartPolicy: Never
      containers:
        - name: terraform
          image: hashicorp/terraform:1.9.8
          imagePullPolicy: IfNotPresent
          workingDir: /workspace
          command: ["/bin/sh", "-ec"]
          args:
            - |
              terraform init -input=false
              terraform apply -input=false -auto-approve \
                -var="trstctl_endpoint=${TRSTCTL_ENDPOINT}" \
                -var="trstctl_token=${TRSTCTL_TOKEN}"
          env:
            - name: TRSTCTL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: trstctl-api
                  key: endpoint
            - name: TRSTCTL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: trstctl-api
                  key: token
          volumeMounts:
            - name: terraform-config
              mountPath: /workspace
              readOnly: true
      volumes:
        - name: terraform-config
          configMap:
            name: trstctl-terraform-config
