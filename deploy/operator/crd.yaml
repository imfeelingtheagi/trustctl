apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trstctlcontrolplanes.trstctl.com
spec:
  group: trstctl.com
  scope: Namespaced
  names:
    kind: TrstctlControlPlane
    plural: trstctlcontrolplanes
    singular: trstctlcontrolplane
    shortNames: ["tcp"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  minimum: 1
                image:
                  type: string
                signerMode:
                  type: string
                  enum: ["sidecar", "isolated"]
                signer:
                  type: object
                  properties:
                    authSecret:
                      type: string
                    authSecretKey:
                      type: string
                    kekSecret:
                      type: string
                    kekSecretKey:
                      type: string
                    keyStorePVC:
                      type: string
                postgres:
                  type: object
                  properties:
                    dsnSecret:
                      type: string
                    dsnSecretKey:
                      type: string
                nats:
                  type: object
                  properties:
                    url:
                      type: string
                    replicas:
                      type: integer
                      minimum: 1
                    allowSingleReplica:
                      type: boolean
                    syncAlways:
                      type: boolean
                    syncIntervalSeconds:
                      type: integer
                      minimum: 1
                externalKMS:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    provider:
                      type: string
                    keyRef:
                      type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                readySurfaces:
                  type: integer
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: trstctlsecretsyncs.trstctl.com
spec:
  group: trstctl.com
  scope: Namespaced
  names:
    kind: TrstctlSecretSync
    plural: trstctlsecretsyncs
    singular: trstctlsecretsync
    shortNames: ["tss"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["controlPlane", "target", "data"]
              properties:
                controlPlane:
                  type: object
                  required: ["url", "tokenSecretRef"]
                  properties:
                    url:
                      type: string
                    tenantID:
                      type: string
                    tokenSecretRef:
                      type: object
                      required: ["name"]
                      properties:
                        name:
                          type: string
                        key:
                          type: string
                target:
                  type: object
                  properties:
                    name:
                      type: string
                    type:
                      type: string
                      default: Opaque
                data:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: ["key", "remoteRef"]
                    properties:
                      key:
                        type: string
                      remoteRef:
                        type: object
                        required: ["name"]
                        properties:
                          name:
                            type: string
                reload:
                  type: object
                  properties:
                    workloads:
                      type: array
                      items:
                        type: object
                        required: ["kind", "name"]
                        properties:
                          kind:
                            type: string
                            enum: ["Deployment", "StatefulSet", "DaemonSet"]
                          name:
                            type: string
            status:
              type: object
              properties:
                phase:
                  type: string
                targetSecret:
                  type: string
                syncedKeys:
                  type: integer
                contentHash:
                  type: string
                reloadedWorkloads:
                  type: array
                  items:
                    type: string
                message:
                  type: string
