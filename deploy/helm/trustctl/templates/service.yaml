apiVersion: v1
kind: Service
metadata:
  name: {{ include "trustctl.fullname" . }}
  labels:
    {{- include "trustctl.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "trustctl.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.service.port }}
      targetPort: https
      protocol: TCP
