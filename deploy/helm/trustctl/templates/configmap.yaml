apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "trustctl.fullname" . }}
  labels:
    {{- include "trustctl.labels" . | nindent 4 }}
data:
  # Served API + transport (R1.3).
  TRUSTCTL_SERVER_ADDR: {{ .Values.server.addr | quote }}
  TRUSTCTL_LOG_FORMAT: {{ .Values.server.logFormat | quote }}
  TRUSTCTL_SERVER_TLS_MODE: {{ .Values.tls.mode | quote }}
  {{- if eq .Values.tls.mode "file" }}
  TRUSTCTL_SERVER_TLS_CERT_FILE: "/etc/trustctl/tls/tls.crt"
  TRUSTCTL_SERVER_TLS_KEY_FILE: "/etc/trustctl/tls/tls.key"
  {{- end }}
  # External datastores (the tested production path).
  TRUSTCTL_POSTGRES_MODE: {{ .Values.postgres.mode | quote }}
  TRUSTCTL_NATS_MODE: {{ .Values.nats.mode | quote }}
  TRUSTCTL_NATS_URL: {{ .Values.nats.url | quote }}
  # The signer is reached in external mode over the shared in-memory UDS (AN-4).
  TRUSTCTL_SIGNER_MODE: "external"
  TRUSTCTL_SIGNER_SOCKET: "/run/trustctl/signer.sock"
  # Sealed-at-rest secrets + stable issuing CA + tamper-evident audit chain.
  TRUSTCTL_SECRETS_KEK_FILE: "/etc/trustctl/kek/kek.bin"
  TRUSTCTL_CA_CERT_FILE: "/data/ca/issuing-ca.crt"
  TRUSTCTL_AUDIT_SIGNING_KEY_FILE: "/data/audit/audit-signing.key"
  # Multi-replica HA (RESIL-002 / RESIL-004 / SPINE-007): leader election gates the
  # continuous background workers to one replica; snapshots make a cold boot / DR
  # restore O(events-since-snapshot). Safe on a single replica too.
  TRUSTCTL_HA_LEADER_ELECTION: {{ .Values.ha.leaderElection | quote }}
  {{- with .Values.ha.leaderCampaignInterval }}
  TRUSTCTL_HA_LEADER_CAMPAIGN_INTERVAL: {{ . | quote }}
  {{- end }}
  {{- with .Values.ha.snapshotInterval }}
  TRUSTCTL_HA_SNAPSHOT_INTERVAL: {{ . | quote }}
  {{- end }}
