{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "trustctl.serviceAccountName" . }}
  labels:
    {{- include "trustctl.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The control plane talks to external PostgreSQL and NATS, not the Kubernetes
# API, so it is granted no cluster RBAC by default (least privilege). Its token
# is not mounted.
automountServiceAccountToken: false
{{- end }}
