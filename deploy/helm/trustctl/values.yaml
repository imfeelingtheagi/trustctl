# Default values for the trustctl control-plane chart.
# This deploys the control plane (API + UI) with the signing service isolated as
# a locked-down sidecar, against EXTERNAL PostgreSQL and NATS (the tested path).

image:
  repository: ghcr.io/imfeelingtheagi/trustctl
  # Empty => the chart renders `v<appVersion>` (a tag the release pipeline
  # actually publishes, e.g. v0.5.0), NOT a bare `<appVersion>` that was never
  # pushed (OPS-003). Override with a specific published tag (`vX.Y.Z` / `latest`)
  # or, for production, an immutable `@sha256:` digest.
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

# Multi-replica HA by default (RESIL-002 / EXC-RESIL-01): the control plane runs
# with redundancy so a node failure or a config rollout does not take issuance/
# validation offline. Safety with >1 replica rests on three mechanisms that ship
# enabled:
#   1. leader election (RESIL-004): exactly ONE replica runs the continuous
#      background workers (projector tailer, outbox dispatcher, GC sweeps, CRL
#      scheduler, audit retention, read-model snapshots) via a PostgreSQL advisory
#      lock, so N replicas never double-apply; the lock frees automatically on crash
#      so a follower takes over (failover). Every replica serves reads.
#   2. A SHARED signer key store (persistence.signerKeysAccessMode: ReadWriteMany):
#      every pod's locked-down signer sidecar (AN-4, UDS-only — NOT the unbuilt
#      isolated-mTLS topology) loads the SAME sealed issuing-CA key, so all replicas
#      are the same CA. First-boot provisioning is serialized by an advisory lock so
#      exactly one replica generates the key; the rest reuse it (signer reload-on-miss
#      reads it from the shared store).
#   3. A RollingUpdate strategy with maxUnavailable: 0 + a PodDisruptionBudget +
#      pod anti-affinity (below), so deploys and node drains keep a replica serving.
# Durability still lives in the external, replicated datastores; the event log is the
# source of truth and a rebuilt pod re-derives state from it (and from a snapshot for
# a fast cold start, SPINE-007). Set replicaCount: 1 for a minimal single-node eval.
# See docs/disaster-recovery.md "High availability" and docs/limitations.md.
replicaCount: 2

# Rollout strategy for the control-plane Deployment (RESIL-002). RollingUpdate with
# maxUnavailable: 0 keeps the full replica count serving THROUGHOUT a deploy (a new
# pod must go Ready before an old one is removed) — no downtime window, unlike the old
# Recreate. maxSurge adds one extra pod during the roll. Set type: Recreate only if
# you deliberately accept a downtime window (e.g. a single-replica eval).
updateStrategy:
  type: RollingUpdate
  maxUnavailable: 0
  maxSurge: 1

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# The control plane serves its API + UI here (HTTPS by default).
service:
  type: ClusterIP
  port: 8443

server:
  addr: ":8443"
  logFormat: json

# TLS for the served API (R1.3):
#   internal = self-signed (default; good for in-cluster mTLS behind an ingress)
#   file     = your certificate (set tls.existingSecret with tls.crt + tls.key)
#   disabled = plaintext (never in production)
tls:
  mode: internal
  existingSecret: ""

# EXTERNAL PostgreSQL is the tested, production default. Provide a DSN inline
# (templated into a Secret) or reference an existing Secret.
postgres:
  mode: external
  dsn: ""
  existingSecret: ""
  existingSecretKey: dsn

# EXTERNAL NATS JetStream is the tested, production default.
nats:
  mode: external
  url: ""

# Deployment KEK (envelope-encryption key, R3.1/R3.2). REQUIRED and STABLE:
# losing it makes the sealed CA key unrecoverable. Supply your own Secret in
# production; the eval-only generate path creates a random KEK preserved across
# upgrades (helm lookup).
kek:
  existingSecret: ""
  existingSecretKey: kek.bin
  generate: false

# The control plane persists the issuing CA cert + audit signing key under /data;
# the signer persists its sealed CA key store. Both need stable storage so a
# restart preserves the issuing CA (R3.2) and the audit chain (R2.1).
#
# For multi-replica HA (replicaCount >= 2) BOTH volumes default to ReadWriteMany so
# all replicas SHARE the issuing CA: the signer key store (sealed CA key, AN-8) and
# the control-plane data dir (public CA cert + the audit signing key) are the same
# across pods, so every replica is the same CA and verifies the same audit chain. Use
# an RWX-capable StorageClass (e.g. an NFS/EFS/Filestore/Azure Files class); set both
# back to ReadWriteOnce only when you run a single replica. The sealed key never
# leaves the signer's locked-down container (AN-4); RWX shares only the SEALED bytes
# at rest, openable solely with the deployment KEK.
persistence:
  enabled: true
  storageClass: ""
  # Access mode for the control-plane data PVC (CA cert + audit signing key). RWX so
  # every HA replica reads the same CA cert + audit key. ReadWriteOnce for one replica.
  controlPlaneAccessMode: ReadWriteMany
  # Access mode for the signer key-store PVC (the sealed CA key). RWX so every pod's
  # signer sidecar loads the SAME sealed CA key (RESIL-002). ReadWriteOnce for one replica.
  signerKeysAccessMode: ReadWriteMany
  controlPlaneSize: 1Gi
  signerKeysSize: 1Gi

# Pod NetworkPolicy: default-deny, then allow the API port in and PostgreSQL,
# NATS, and DNS out. The signer has no listener at all, so it is unreachable.
networkPolicy:
  enabled: true
  # Who may reach the API/UI port (8443). The default is the ingress controller
  # ONLY — NOT every pod in the namespace (OPS-009). Each block below is additive;
  # leave them empty/false to admit nothing and rely on the ingress controller.
  ingress:
    # Admit the ingress controller by namespace + pod label. Defaults match the
    # ingress-nginx convention; override for your controller (Traefik, HAProxy,
    # cloud LB controller, …). Set namespaceLabels/podLabels to {} to disable.
    ingressController:
      enabled: true
      namespaceLabels:
        kubernetes.io/metadata.name: ingress-nginx
      podLabels:
        app.kubernetes.io/name: ingress-nginx
    # Explicit opt-in to admit ALL pods in trustctl's own namespace. Off by
    # default: the old behavior (podSelector {}) exposed the API to every
    # co-tenant pod, which the "open only what is needed" policy should not do.
    sameNamespace: false
  # Additional namespaces allowed to reach the API port (by metadata.name).
  allowedIngressNamespaces: []
  postgres:
    port: 5432
  nats:
    port: 4222

resources:
  controlPlane:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  signer:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []

# Pod anti-affinity (RESIL-002): with the multi-replica default, spread control-plane
# pods across nodes so a single node failure cannot take ALL replicas down at once.
# It is a PREFERRED (soft) rule so the chart still schedules on a single-node cluster
# or an eval (replicaCount: 1) rather than leaving pods Pending — override with a
# required rule for a hard guarantee. Set affinity: {} to disable.
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: trustctl
              app.kubernetes.io/component: control-plane

# PodDisruptionBudget (RESIL-002 / RESIL-007): ENABLED by default now that the chart
# runs multi-replica, with minAvailable: 1 — a REAL guarantee that a voluntary
# disruption (node drain, cluster upgrade) keeps at least one control-plane pod
# serving. (minAvailable: 0 would be a no-op that never blocks an eviction, so it is
# rejected.) If you run replicaCount: 1, disable this — a PDB cannot protect a single
# replica from a node drain, and a minAvailable: 1 PDB would BLOCK the drain entirely.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Multi-replica HA behavior (RESIL-002 / RESIL-004 / SPINE-007). These map to the
# binary's TRUSTCTL_HA_* config. Leader election is ON by default: it is what makes
# >1 replica safe (only the leader runs the continuous background workers), and it is
# harmless on a single replica (that replica always wins the lock). Disable it ONLY if
# you run exactly one replica and want to skip the advisory lock.
ha:
  leaderElection: true
  # How often a follower re-attempts leadership and the leader re-checks the lock.
  # Empty uses the binary default (~3s). Shorter = faster failover, more probes.
  leaderCampaignInterval: ""
  # How often the leader writes a read-model snapshot so a cold boot / DR restore is
  # O(events-since-snapshot) instead of a full-log replay (SPINE-007). Empty uses the
  # binary default (~5m); "0" disables periodic snapshots (boot then full catch-up).
  snapshotInterval: ""

# --- Signer topology + external KMS ------------------------------------------
# Signer deployment mode:
#   "sidecar"  (default, SUPPORTED) — co-locates a locked-down signer with EACH
#              control-plane replica, reachable only over a shared in-memory UDS
#              (AN-4). This is the tested, shippable topology, and it now supports
#              MULTI-REPLICA HA: with a shared signer key store (RWX,
#              persistence.signerKeysAccessMode) every replica's sidecar loads the
#              SAME sealed issuing-CA key, so all replicas are the same CA. signer.replicas
#              is unused in this mode (one sidecar per control-plane pod).
#   "isolated" (NOT YET IMPLEMENTED) — would run the signer as its OWN
#              network-policy-isolated pod reached over an mTLS gRPC channel. The
#              cross-node mTLS transport this needs is not built yet (the
#              trustctl-signer binary is UDS-only; see docs/limitations.md
#              "Multi-replica HA" and SIGNER-005), so selecting it FAILS the render
#              with guidance rather than shipping a crash-looping signer pod (OPS-001).
#              Leave this at "sidecar" — it is the supported HA topology.
signer:
  mode: sidecar
  replicas: 1
  resources: {}

# External KMS for the deployment KEK / signer key material (AN-8): never store
# key material in plain manifests.
# NOTE: external-KMS-backed signer key material is wired only on the not-yet-built
# "isolated" signer topology above; the supported "sidecar" topology seals its CA
# key with the deployment KEK (see the `kek` values). These knobs are reserved for
# the S15.1 isolated topology and are inert today.
externalKMS:
  enabled: false
  provider: ""   # awskms | gcpkms | azurekv | pkcs11
  keyRef: ""
