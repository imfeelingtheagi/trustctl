# Default values for the trustctl control-plane chart.
# This deploys the control plane (API + UI) with the signing service isolated as
# a locked-down sidecar, against EXTERNAL PostgreSQL and NATS (the tested path).

image:
  repository: ghcr.io/imfeelingtheagi/trustctl
  # Empty => the chart renders `v<appVersion>` (a tag the release pipeline
  # actually publishes, e.g. v0.5.0), NOT a bare `<appVersion>` that was never
  # pushed (OPS-003). Override with a specific published tag (`vX.Y.Z` / `latest`)
  # or, for production, an immutable `@sha256:` digest.
  tag: ""
  pullPolicy: IfNotPresent
imagePullSecrets: []

# Single control-plane replica BY DESIGN (RESIL-002): the issuing CA key is held
# by the co-located signer sidecar with a PER-POD sealed key store, so a second
# replica would be a second, independent signer — not the same CA. True horizontal
# scaling needs the signer as its own pod reached over mTLS (signer.mode: isolated),
# which is not built yet (S15.1). Consequence: a node failure or any config rollout
# takes issuance/validation offline until the pod reschedules, and the Recreate
# strategy below guarantees a brief downtime window on every deploy. This is an
# AVAILABILITY trade-off, not data loss — durability lives in the external,
# replicated datastores; a rebuilt pod re-derives state from the event log. The
# supported HA posture today is fast failover of this single active replica (keep it
# under a Deployment, keep Postgres/NATS replicated). See docs/disaster-recovery.md
# "High availability" and docs/limitations.md "Multi-replica HA" for the
# active/active plan (leader election + isolated signer, RESIL-004 / EXC-RESIL-01).
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# The control plane serves its API + UI here (HTTPS by default).
service:
  type: ClusterIP
  port: 8443

server:
  addr: ":8443"
  logFormat: json

# TLS for the served API (R1.3):
#   internal = self-signed (default; good for in-cluster mTLS behind an ingress)
#   file     = your certificate (set tls.existingSecret with tls.crt + tls.key)
#   disabled = plaintext (never in production)
tls:
  mode: internal
  existingSecret: ""

# EXTERNAL PostgreSQL is the tested, production default. Provide a DSN inline
# (templated into a Secret) or reference an existing Secret.
postgres:
  mode: external
  dsn: ""
  existingSecret: ""
  existingSecretKey: dsn

# EXTERNAL NATS JetStream is the tested, production default.
nats:
  mode: external
  url: ""

# Deployment KEK (envelope-encryption key, R3.1/R3.2). REQUIRED and STABLE:
# losing it makes the sealed CA key unrecoverable. Supply your own Secret in
# production; the eval-only generate path creates a random KEK preserved across
# upgrades (helm lookup).
kek:
  existingSecret: ""
  existingSecretKey: kek.bin
  generate: false

# The control plane persists the issuing CA cert + audit signing key under /data;
# the signer persists its sealed CA key store. Both need stable storage so a
# restart preserves the issuing CA (R3.2) and the audit chain (R2.1).
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  controlPlaneSize: 1Gi
  signerKeysSize: 1Gi

# Pod NetworkPolicy: default-deny, then allow the API port in and PostgreSQL,
# NATS, and DNS out. The signer has no listener at all, so it is unreachable.
networkPolicy:
  enabled: true
  # Namespaces allowed to reach the API port. Empty = same namespace only.
  allowedIngressNamespaces: []
  postgres:
    port: 5432
  nats:
    port: 4222

resources:
  controlPlane:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  signer:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}

podDisruptionBudget:
  enabled: true
  minAvailable: 0

# --- S15.1: signer topology + external KMS -----------------------------------
# Signer deployment mode:
#   "sidecar"  (default, SUPPORTED) — co-locates the signer with a single
#              control-plane replica, reachable only over a shared in-memory UDS
#              (AN-4). This is the tested, shippable topology.
#   "isolated" (NOT YET IMPLEMENTED) — would run the signer as its OWN
#              network-policy-isolated pod reached over an mTLS gRPC channel,
#              enabling control-plane horizontal scaling. The cross-node mTLS
#              transport this needs is not built yet (the trustctl-signer binary
#              is UDS-only; see docs/limitations.md "Multi-replica HA"), so
#              selecting it FAILS the render with guidance rather than shipping a
#              crash-looping signer pod (OPS-001). Leave this at "sidecar".
signer:
  mode: sidecar
  replicas: 1
  resources: {}

# External KMS for the deployment KEK / signer key material (AN-8): never store
# key material in plain manifests.
# NOTE: external-KMS-backed signer key material is wired only on the not-yet-built
# "isolated" signer topology above; the supported "sidecar" topology seals its CA
# key with the deployment KEK (see the `kek` values). These knobs are reserved for
# the S15.1 isolated topology and are inert today.
externalKMS:
  enabled: false
  provider: ""   # awskms | gcpkms | azurekv | pkcs11
  keyRef: ""
