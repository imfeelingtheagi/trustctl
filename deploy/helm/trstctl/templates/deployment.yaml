{{- /* OPS-001: reject an unimplemented/unrecognized signer topology before
       rendering anything, so a default (sidecar) install renders cleanly while
       --set signer.mode=isolated fails fast with guidance instead of shipping a
       crash-looping signer pod. This template always renders, so it validates
       the mode on every helm template/install. */ -}}
{{- include "trstctl.requiredInputs.guard" . -}}
{{- include "trstctl.signer.guardMode" . -}}
{{- $signerAuthKey := "sign-auth.bin" -}}
{{- with .Values.signer }}
{{- with .auth }}
{{- with .existingSecretKey }}{{- $signerAuthKey = . }}{{- end }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "trstctl.fullname" . }}
  labels:
    {{- include "trstctl.labels" . | nindent 4 }}
spec:
  # Multi-replica HA by default (RESIL-002): redundancy + a RollingUpdate that keeps
  # the full replica count serving across a deploy (maxUnavailable: 0). Safety with
  # >1 replica comes from leader election (only the leader runs the continuous
  # background workers, RESIL-004) and a SHARED signer key store (every signer
  # process loads the same sealed CA key). See values.yaml. updateStrategy.type: Recreate is
  # available for a single-replica eval that accepts a downtime window.
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: {{ .Values.updateStrategy.type }}
    {{- if eq .Values.updateStrategy.type "RollingUpdate" }}
    rollingUpdate:
      maxUnavailable: {{ .Values.updateStrategy.maxUnavailable }}
      maxSurge: {{ .Values.updateStrategy.maxSurge }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "trstctl.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "trstctl.labels" . | nindent 8 }}
      annotations:
        # Roll the pod when the config changes.
        checksum/config: {{ printf "%s|%s|%t" .Values.server.addr .Values.tls.mode .Values.tls.allowPlaintextDev | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "trstctl.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        {{- if eq .Values.signer.mode "sidecar" }}
        # ---- The signing service (AN-4): its OWN locked-down container with NO
        # network listener. It speaks only over the shared in-memory UDS, so
        # nothing on the cluster network can reach it. Its CA key is sealed at
        # rest in a persistent key store, so a restart preserves the issuing CA.
        - name: signer
          image: {{ include "trstctl.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/trstctl-signer"]
          args:
            - "--socket=/run/trstctl/signer.sock"
            - "--keystore=/data/signer/keys"
            - "--kek=/etc/trstctl/kek/kek.bin"
            - "--auth-secret=/etc/trstctl/signer-auth/{{ $signerAuthKey }}"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: signer-sock
              mountPath: /run/trstctl
            - name: signer-keys
              mountPath: /data/signer
            - name: kek
              mountPath: /etc/trstctl/kek
              readOnly: true
            - name: signer-auth
              mountPath: /etc/trstctl/signer-auth
              readOnly: true
          resources:
            {{- toYaml .Values.resources.signer | nindent 12 }}
        {{- end }}
        # ---- The control plane: API + web UI. Connects to the signer over the
        # configured out-of-process signer transport, and to EXTERNAL PostgreSQL + NATS.
        - name: trstctl
          image: {{ include "trstctl.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
            {{- if .Values.agentChannel.enabled }}
            # Served agent steady-state mTLS gRPC channel (WIRE-004 / OPS-005): the
            # port enrolled agents connect to in order to heartbeat + renew. Mutual
            # TLS; the agent CA is custodied in the signer. Off by default.
            - name: agent-grpc
              containerPort: 9443
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "trstctl.fullname" . }}
          env:
            - name: TRSTCTL_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "trstctl.dbSecretName" . }}
                  key: {{ .Values.postgres.existingSecretKey }}
            {{- if eq .Values.signer.mode "isolated" }}
            - name: TRSTCTL_SIGNER_MTLS_PEER_PIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.signer.mtls.controlPlaneSecret | default (printf "%s-cp-signer-mtls" (include "trstctl.fullname" .)) }}
                  key: peer-pin
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          # The binary probes itself over the same transport it serves (HTTPS by
          # default) — distroless has no shell, so these are exec probes on the
          # binary itself. Startup/liveness hit /healthz; readiness hits /readyz so
          # dependency outages remove the pod from rotation without killing it.
          startupProbe:
            exec:
              command: ["/usr/local/bin/trstctl", "--health-check"]
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["/usr/local/bin/trstctl", "--ready-check"]
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["/usr/local/bin/trstctl", "--health-check"]
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            {{- if eq .Values.signer.mode "sidecar" }}
            - name: signer-sock
              mountPath: /run/trstctl
            {{- end }}
            - name: cp-data
              mountPath: /data
            - name: kek
              mountPath: /etc/trstctl/kek
              readOnly: true
            {{- if .Values.signer.auth.allowCoResidentAuthorizer }}
            - name: signer-auth
              mountPath: /etc/trstctl/signer-auth
              readOnly: true
            {{- end }}
            {{- if eq .Values.signer.mode "isolated" }}
            - name: signer-mtls
              mountPath: /etc/trstctl/signer-mtls
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
            {{- if eq .Values.tls.mode "file" }}
            - name: tls
              mountPath: /etc/trstctl/tls
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.resources.controlPlane | nindent 12 }}
      volumes:
        {{- if eq .Values.signer.mode "sidecar" }}
        # Shared in-memory socket between the control plane and the signer — the
        # only channel to the signer, and never written to disk.
        - name: signer-sock
          emptyDir:
            medium: Memory
        {{- end }}
        - name: tmp
          emptyDir: {}
        - name: kek
          secret:
            secretName: {{ include "trstctl.kekSecretName" . }}
            defaultMode: 0440
        {{- if eq .Values.signer.mode "sidecar" }}
        - name: signer-auth
          secret:
            secretName: {{ include "trstctl.signerAuthSecretName" . }}
            defaultMode: 0440
        {{- end }}
        {{- if eq .Values.signer.mode "isolated" }}
        - name: signer-mtls
          secret:
            secretName: {{ .Values.signer.mtls.controlPlaneSecret | default (printf "%s-cp-signer-mtls" (include "trstctl.fullname" .)) }}
        {{- end }}
        {{- if .Values.persistence.enabled }}
        - name: cp-data
          persistentVolumeClaim:
            claimName: {{ include "trstctl.fullname" . }}-data
        {{- if eq .Values.signer.mode "sidecar" }}
        - name: signer-keys
          persistentVolumeClaim:
            claimName: {{ include "trstctl.fullname" . }}-signer-keys
        {{- end }}
        {{- else }}
        - name: cp-data
          emptyDir: {}
        {{- if eq .Values.signer.mode "sidecar" }}
        - name: signer-keys
          emptyDir: {}
        {{- end }}
        {{- end }}
        {{- if eq .Values.tls.mode "file" }}
        - name: tls
          secret:
            secretName: {{ required "tls.existingSecret is required when tls.mode=file" .Values.tls.existingSecret }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "trstctl.fullname" . }}-data
  labels:
    {{- include "trstctl.labels" . | nindent 4 }}
spec:
  # RWX by default so every HA replica shares the CA cert + audit signing key
  # (RESIL-002); ReadWriteOnce for a single-replica eval.
  accessModes: [{{ .Values.persistence.controlPlaneAccessMode | quote }}]
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.controlPlaneSize | quote }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "trstctl.fullname" . }}-signer-keys
  labels:
    {{- include "trstctl.labels" . | nindent 4 }}
spec:
  # RWX by default so every signer process loads the SAME sealed CA key
  # (RESIL-002); ReadWriteOnce for a single-replica eval.
  accessModes: [{{ .Values.persistence.signerKeysAccessMode | quote }}]
  {{- with .Values.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.signerKeysSize | quote }}
{{- end }}
