{{- /*
Secrets: the deployment KEK and the PostgreSQL DSN. In production, supply your
own Secrets and reference them via kek.existingSecret / postgres.existingSecret;
the templated Secrets below are for evaluation. The KEK is preserved across
upgrades via lookup so it is never silently rotated (which would orphan the
sealed CA key).
*/ -}}
{{- if and (not .Values.kek.existingSecret) .Values.kek.generate }}
{{- $kekName := include "trstctl.kekSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $kekName -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $kekName }}
  labels:
    {{- include "trstctl.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if and $existing $existing.data (index $existing.data .Values.kek.existingSecretKey) }}
  {{ .Values.kek.existingSecretKey }}: {{ index $existing.data .Values.kek.existingSecretKey }}
  {{- else }}
  {{ .Values.kek.existingSecretKey }}: {{ randBytes 32 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- $signerAuthExistingSecret := "" -}}
{{- $signerAuthKey := "sign-auth.bin" -}}
{{- $signerAuthGenerate := true -}}
{{- with .Values.signer }}
{{- with .auth }}
{{- with .existingSecret }}{{- $signerAuthExistingSecret = . }}{{- end }}
{{- with .existingSecretKey }}{{- $signerAuthKey = . }}{{- end }}
{{- if eq .generate false }}{{- $signerAuthGenerate = false }}{{- end }}
{{- end }}
{{- end }}
{{- if and (not $signerAuthExistingSecret) $signerAuthGenerate }}
{{- $signerAuthName := include "trstctl.signerAuthSecretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $signerAuthName }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $signerAuthName }}
  labels:
    {{- include "trstctl.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- if and $existing $existing.data (index $existing.data $signerAuthKey) }}
  {{ $signerAuthKey }}: {{ index $existing.data $signerAuthKey }}
  {{- else }}
  {{ $signerAuthKey }}: {{ randBytes 32 | b64enc | quote }}
  {{- end }}
{{- end }}
{{- if and (not .Values.postgres.existingSecret) .Values.postgres.dsn }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "trstctl.dbSecretName" . }}
  labels:
    {{- include "trstctl.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.postgres.existingSecretKey }}: {{ .Values.postgres.dsn | quote }}
{{- end }}
