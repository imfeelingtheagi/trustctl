apiVersion: v2
name: trstctl
description: >-
  The trstctl control plane (non-human-identity / certificate lifecycle
  management) for Kubernetes: the API + web UI, with the signing service
  isolated behind AN-4 as either a locked-down UDS sidecar or a separate mTLS
  signer pod, wired to external PostgreSQL and NATS JetStream.
type: application
# Chart version (SemVer). Bump on any chart change.
version: 0.1.0
# The trstctl release this chart deploys by default. Keep this in LOCKSTEP with a
# published release tag (OPS-003): the release pipeline tags images `vX.Y.Z` (from
# `git describe`), so when image.tag is empty the chart renders
# `<repo>:v<appVersion>` — a tag the pipeline actually publishes — instead of an
# unpublished `:0.1.0` that ImagePullBackOffs. Production installs should set
# image.digest so pods render `<repo>@sha256:...`. appVersion follows Helm's
# leading-`v`-stripped convention; the `v` is re-added when forming the image tag
# (see templates/_helpers.tpl "trstctl.image"). deploy/helm/helm_test.go asserts
# this consistency, so a future bump that breaks it fails CI.
appVersion: "0.5.0"
keywords:
  - certificates
  - pki
  - acme
  - non-human-identity
  - certificate-lifecycle
home: https://github.com/ctlplne/trstctl
sources:
  - https://github.com/ctlplne/trstctl
maintainers:
  - name: trstctl maintainers
    url: https://github.com/ctlplne/trstctl
annotations:
  # Supported signer topologies:
  # - sidecar (default): co-located signer over an in-memory UDS, no network surface.
  # - isolated: separate signer pod reached over mutually pinned mTLS.
  trstctl.com/signer-topology: "sidecar-uds-or-isolated-mtls"
