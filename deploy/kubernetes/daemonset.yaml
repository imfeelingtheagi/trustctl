apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: trstctl-agent
  namespace: trstctl
  labels:
    app.kubernetes.io/name: trstctl-agent
    app.kubernetes.io/part-of: trstctl
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: trstctl-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trstctl-agent
    spec:
      serviceAccountName: trstctl-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          # The agent ships inside the single multi-binary trstctl image (the
          # one the release pipeline builds and pushes); run it by overriding the
          # image's default `trstctl` entrypoint with trstctl-agent. There is no
          # separate, un-built "-agent" image (OPS-002). This file is a digest
          # template: render it with scripts/release/render-kubernetes-agent-daemonset.sh
          # and a verified release image before applying.
          image: ghcr.io/ctlplne/trstctl@sha256:RELEASE_DIGEST_REQUIRED
          command: ["/usr/local/bin/trstctl-agent"]
          args:
            - "--k8s"
            - "--enroll-url=$(TRSTCTL_ENROLL_URL)"
            - "--bootstrap-token-file=/var/run/trstctl/bootstrap/token"
            - "--ca-bundle=/etc/trstctl/ca-bundle.pem"
            - "--server=$(TRSTCTL_SERVER)"
            - "--server-name=$(TRSTCTL_SERVER_NAME)"
            - "--name=$(NODE_NAME)"
            - "--key=/var/lib/trstctl-agent/agent.key"
            - "--cert=/var/lib/trstctl-agent/agent.crt"
            - "--k8s-secret=trstctl/$(NODE_NAME)-tls"
            - "--cert-manager-issuer=trstctl"
            - "--cert-manager-controller"
            - "--bridge-signer-url=$(TRSTCTL_BRIDGE_SIGNER_URL)"
            - "--bridge-signer-token-file=/var/run/trstctl/cert-manager/token"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: TRSTCTL_ENROLL_URL
              value: "https://trstctl:8443"
            - name: TRSTCTL_SERVER
              value: "trstctl:9443"
            - name: TRSTCTL_SERVER_NAME
              value: "trstctl"
            - name: TRSTCTL_BRIDGE_SIGNER_URL
              valueFrom:
                secretKeyRef:
                  name: trstctl-cert-manager-issuer
                  key: signer-url
          volumeMounts:
            - name: bootstrap-token
              mountPath: /var/run/trstctl/bootstrap
              readOnly: true
            - name: cert-manager-issuer
              mountPath: /var/run/trstctl/cert-manager
              readOnly: true
            - name: ca-bundle
              mountPath: /etc/trstctl
              readOnly: true
            - name: identity
              mountPath: /var/lib/trstctl-agent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: bootstrap-token
          secret:
            secretName: trstctl-agent-bootstrap
            items:
              - key: token
                path: token
        - name: cert-manager-issuer
          secret:
            secretName: trstctl-cert-manager-issuer
            items:
              - key: token
                path: token
        - name: ca-bundle
          configMap:
            name: trstctl-ca-bundle
        - name: identity
          emptyDir:
            sizeLimit: 16Mi
