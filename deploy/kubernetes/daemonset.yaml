apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: trustctl-agent
  namespace: trustctl
  labels:
    app.kubernetes.io/name: trustctl-agent
    app.kubernetes.io/part-of: trustctl
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: trustctl-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: trustctl-agent
    spec:
      serviceAccountName: trustctl-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: ghcr.io/imfeelingtheagi/trustctl-agent:latest
          args:
            - "--k8s"
            - "--enroll-url=$(TRUSTCTL_ENROLL_URL)"
            - "--ca-bundle=/etc/trustctl/ca-bundle.pem"
            - "--server=$(TRUSTCTL_SERVER)"
            - "--name=$(NODE_NAME)"
            - "--k8s-secret=trustctl/$(NODE_NAME)-tls"
            - "--cert-manager-issuer=trustctl"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: TRUSTCTL_ENROLL_URL
              value: "https://trustctl.trustctl.svc:8443/enroll"
            - name: TRUSTCTL_SERVER
              value: "trustctl.trustctl.svc:9443"
          volumeMounts:
            - name: ca-bundle
              mountPath: /etc/trustctl
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: ca-bundle
          configMap:
            name: trustctl-ca-bundle
            optional: true
