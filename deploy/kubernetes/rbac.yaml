apiVersion: v1
kind: ServiceAccount
metadata:
  name: trstctl-agent
  namespace: trstctl
  labels:
    app.kubernetes.io/name: trstctl-agent
---
# The agent writes TLS Secrets, acts as a cert-manager external issuer, and
# fulfils trstctl-native Certificate resources. It reads CertificateRequests,
# updates their status, reads trstctl Issuer/ClusterIssuer/Certificate resources,
# and updates their status. Least privilege — no delete, no access to unrelated
# resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: trstctl-agent
  labels:
    app.kubernetes.io/name: trstctl-agent
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["cert-manager.io"]
    resources: ["certificaterequests/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["trstctl.com"]
    resources: ["issuers", "clusterissuers", "certificates"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["trstctl.com"]
    resources: ["issuers/status", "clusterissuers/status", "certificates/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: trstctl-agent
  labels:
    app.kubernetes.io/name: trstctl-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: trstctl-agent
subjects:
  - kind: ServiceAccount
    name: trstctl-agent
    namespace: trstctl
