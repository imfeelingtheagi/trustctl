# certctl evaluation stack.
#
#   docker compose -f deploy/docker/docker-compose.yml up --build
#
# brings up the control plane against PostgreSQL and NATS JetStream. The control
# plane is wired to them as an EXTERNAL datastore configuration — which is
# exactly the code path you use when pointing certctl at your own managed
# Postgres/NATS. To do that, override CERTCTL_POSTGRES_DSN and CERTCTL_NATS_URL
# (and drop the bundled postgres/nats services).

name: certctl

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: certctl
      POSTGRES_USER: certctl
      POSTGRES_PASSWORD: certctl
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U certctl -d certctl"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    # JetStream is the event spine (AN-2), file-backed under /data.
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 20

  certctl:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: ghcr.io/certctl/certctl:latest
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      CERTCTL_SERVER_ADDR: ":8443"
      # External-datastore configuration (the tested external path).
      CERTCTL_POSTGRES_MODE: external
      CERTCTL_POSTGRES_DSN: "postgres://certctl:certctl@postgres:5432/certctl?sslmode=disable"
      CERTCTL_NATS_MODE: external
      CERTCTL_NATS_URL: "nats://nats:4222"
      CERTCTL_LOG_FORMAT: json
      # TLS is on by default (server.tls.mode=internal): the control plane serves
      # HTTPS with a self-signed certificate, so reach it at https://localhost:8443
      # (curl -k). For production set CERTCTL_SERVER_TLS_MODE=file with your cert.
    ports:
      - "8443:8443"
    healthcheck:
      # Distroless has no shell; the binary probes its own /healthz over the same
      # transport the server uses (HTTPS by default). The control plane also
      # supervises the signer as a child process (AN-4), so a single container
      # runs both certctl and certctl-signer.
      test: ["CMD", "/usr/local/bin/certctl", "--health-check"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

volumes:
  pgdata:
  natsdata:
