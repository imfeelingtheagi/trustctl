name: Security scans

# Secret scanning (gitleaks) and container-image vulnerability scanning (Trivy),
# wired as required checks so a planted secret or a vulnerable base image cannot
# merge (SF.1). Dependency scanning is covered by the govulncheck job in ci.yml
# and by Dependabot (.github/dependabot.yml); SAST by codeql.yml.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

env:
  GITLEAKS_VERSION: "8.21.2"
  TRIVY_VERSION: "0.71.1"

jobs:
  gitleaks:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # scan full history, not just the tip

      - name: Install gitleaks (pinned + checksum-verified)
        env:
          # SHA-256 of gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz from the
          # upstream-published gitleaks_${GITLEAKS_VERSION}_checksums.txt. Bumping
          # GITLEAKS_VERSION requires updating this pin (Dependabot can't, so the
          # version+hash move together in review). A download that does not match
          # this exact digest fails the job — we never tar/install unverified bytes
          # (SUPPLY-006).
          GITLEAKS_SHA256: "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
        run: |
          set -euo pipefail
          file="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          curl -fsSL "${base}/${file}" -o "/tmp/${file}"
          # 1) Hard pin: the tarball must match the digest baked above.
          echo "${GITLEAKS_SHA256}  /tmp/${file}" | sha256sum -c -
          # 2) Defense-in-depth: that digest must also be the one upstream published
          #    for this exact file in the release's checksums manifest.
          curl -fsSL "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          grep -E "^${GITLEAKS_SHA256}  ${file}\$" /tmp/gitleaks_checksums.txt \
            || { echo "::error::pinned GITLEAKS_SHA256 is not the digest upstream published for ${file}"; exit 1; }
          tar -xzf "/tmp/${file}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # `detect` scans the committed history; `--no-banner --redact` keeps logs
      # clean and never echoes a matched secret. Non-zero exit (a finding) fails
      # the job. The config (.gitleaks.toml) only allowlists test placeholders.
      - name: Scan repository for secrets
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner --verbose

  image-scan:
    name: container image scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 25 # TEST-004 (builds the image, then Trivy-scans it)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve the distroless runtime base by digest (pin, not tag)
        id: base
        run: |
          set -euo pipefail
          base="gcr.io/distroless/static-debian12:nonroot"
          digest="$(docker buildx imagetools inspect "$base" --format '{{.Manifest.Digest}}')"
          echo "ref=gcr.io/distroless/static-debian12@${digest}" >> "$GITHUB_OUTPUT"

      - name: Build the runtime image from the digest-pinned base
        run: |
          set -euo pipefail
          docker build \
            --build-arg BASE_IMAGE='${{ steps.base.outputs.ref }}' \
            -f deploy/docker/Dockerfile \
            -t trstctl:ci-scan .

      - name: Install Trivy (pinned + checksum-verified)
        run: |
          set -euo pipefail
          file="trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          base="https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}"
          curl -fsSL "${base}/${file}" -o "/tmp/${file}"
          # Verify the downloaded tarball against the digest upstream published for
          # this exact release (trivy_<ver>_checksums.txt), pinned by version. A
          # corrupted or swapped download fails `sha256sum -c` and the job stops —
          # we never tar/install unverified bytes (SUPPLY-006).
          curl -fsSL "${base}/trivy_${TRIVY_VERSION}_checksums.txt" -o /tmp/trivy_checksums.txt
          ( cd /tmp && grep " ${file}\$" trivy_checksums.txt | sha256sum -c - )
          tar -xzf "/tmp/${file}" -C /tmp trivy
          sudo install -m 0755 /tmp/trivy /usr/local/bin/trivy
          trivy --version

      # Fail the build on any fixable HIGH/CRITICAL OS or library vulnerability
      # in the assembled image (this is what catches a vulnerable base image).
      - name: Scan the image
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --no-progress \
            trstctl:ci-scan

      - name: Verify the production image base is digest-pinned (not a floating tag)
        run: bash scripts/ci/check-base-pinned.sh

      # Supply-chain pin policy, part two: every third-party GitHub Action is
      # pinned by an immutable commit SHA, never a mutable tag (SUPPLY-002). The
      # release pipeline holds packages:write + id-token:write, so a repointed
      # action tag is an OIDC-token / image-push risk.
      - name: Verify third-party actions are SHA-pinned (not floating tags)
        run: |
          bash scripts/ci/check-actions-pinned_selftest.sh
          bash scripts/ci/check-actions-pinned.sh .
