name: CodeQL

# Static application security testing (SAST) for the Go control plane and the
# web UI. CodeQL findings at or above its default severity fail the check, so a
# vulnerable pattern cannot merge (SF.1). Runs on every PR, on pushes to main,
# and weekly to catch newly published queries against unchanged code.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "27 3 * * 1" # Mondays 03:27 UTC

# Least privilege: CodeQL needs to read the code and upload results to the
# code-scanning API; nothing else.
permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
