name: CI

# Build, test, and lint the module on every pull request and on pushes to main.
# The nightly schedule drives the deeper fuzz budget (FUZZ-003); per-PR runs use a
# short smoke budget so the regression net is exercised on every change.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # 03:17 UTC daily — the longer nightly fuzz pass.
    - cron: "17 3 * * *"

# Least-privilege token: CI only needs to read the repository.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-lint:
    name: build / test / lint
    runs-on: ubuntu-latest
    # Per-job timeout so a hung embedded-PG/NATS/signer integration job fails fast
    # instead of burning the 6-hour GitHub default (TEST-004).
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so `git describe` can stamp the version

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Build
        run: make build

      - name: Smoke test (--version boots and exits cleanly)
        run: ./bin/trstctl --version

      - name: Test
        # TRSTCTL_REQUIRE_OPENSSH=1 forces the stock-OpenSSH SSH-certificate
        # cross-checks (ssh-keygen -L / -Q) to RUN and assert on the runner, which
        # always ships ssh-keygen — so the INTEROP-S3 strength (trstctl SSH certs
        # verify with the reference toolchain) cannot silently regress via a skip.
        env:
          TRSTCTL_REQUIRE_OPENSSH: "1"
        run: make test

      # Install the pinned golangci-lint v2 (required for Go 1.26) so the lint
      # step uses a deterministic version rather than the runner's.
      - name: Install lint tooling
        run: make tools

      # LINT_STRICT=1 makes `make lint` HARD-FAIL if golangci-lint/actionlint are
      # absent rather than silently skipping them (CODE-005) — since `make tools`
      # just installed them, this proves the full lint actually ran in CI.
      - name: Lint
        run: make lint LINT_STRICT=1

      # Verify the CI gates' own logic (the critical-package coverage evaluator
      # and the base-image digest-pinning guard) so a regression in a gate is
      # caught here rather than silently weakening the build (SF.1).
      - name: Gate self-tests
        run: |
          bash scripts/ci/coverage-critical_selftest.sh
          bash scripts/ci/coverage-server-lifecycle_selftest.sh
          bash scripts/ci/check-base-pinned_selftest.sh
          bash scripts/ci/check-base-pinned.sh .

  # Continuous-fuzzing regression net (FUZZ-003). The mandated "fuzz every parser
  # that touches untrusted input" (CLAUDE.md §6) is only a safety net if it RUNS:
  # this job replays each target's committed seed corpus (under testdata/fuzz, so a
  # known crasher like FUZZ-001's 0x30 0x84 fails fast) and then fuzzes each target
  # for a short budget. The schedule trigger raises the budget for a deeper nightly
  # pass. A new crasher fails CI here instead of shipping.
  fuzz:
    name: fuzz (smoke per-PR, deeper nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30 # TEST-004 (nightly raises the fuzz budget)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      # The in-repo coverage guard (TestEveryUntrustedParserIsFuzzed) fails if any
      # untrusted-input parser lacks a fuzz target, keeping the denominator honest.
      - name: Coverage guard (every untrusted parser is fuzzed)
        run: go test ./internal/crypto/ -run TestEveryUntrustedParserIsFuzzed -count=1

      # Short budget per target on a PR; a longer budget on the nightly schedule.
      - name: Fuzz smoke (all targets; committed seeds first)
        run: make fuzz-smoke FUZZ_SMOKE_TIME=${{ github.event_name == 'schedule' && '120s' || '15s' }}

  web:
    name: web ui (typecheck / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 20 # TEST-004
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Go is needed for the embedded-UI release gate + the committed-bundle
      # freshness check below (the bundle the binary embeds is in this repo).
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install dependencies
        run: npm ci

      # Software-composition analysis of the npm dependency tree — it lives
      # outside go.sum, so it needs its own scan before redistribution. Fails the
      # build on a known high/critical advisory in the production tree.
      - name: SCA (npm audit)
        run: npm audit --omit=dev --audit-level=high

      # FE↔BE contract gate (SURFACE-005): the generated FE types must match the
      # served OpenAPI contract. `npm run build` runs this too, but as an explicit,
      # legible CI step it points straight at the fix when it fails.
      - name: Contract check (FE types vs served OpenAPI)
        run: npm run gen:api -- --check

      - name: Type-check
        run: npm run typecheck

      - name: Test (Vitest + axe accessibility)
        run: npm test

      - name: Build (Vite -> internal/webui/dist)
        run: npm run build

      # SURFACE-001/006 release gate: the freshly-built bundle the binary embeds must
      # be a REAL Vite build (a hashed module bundle), never the dead placeholder.
      - name: Embedded UI is a real build (release gate)
        working-directory: .
        env:
          TRSTCTL_REQUIRE_BUILT_UI: "1"
        run: go test ./internal/webui/...

      # The built bundle is committed (so a plain `go build` serves the real console).
      # Fail if the committed artifact drifts from a fresh build — i.e. someone changed
      # web/ but did not re-run `make web` and commit the regenerated bundle.
      - name: Committed web bundle is up to date
        working-directory: .
        run: |
          if ! git diff --exit-code -- internal/webui/dist web/src/lib/api-types.gen.ts; then
            echo "::error::internal/webui/dist (or the generated FE types) is stale. Run 'make web' and commit the regenerated bundle (EXC-WIRE-04 / SURFACE-001)." >&2
            exit 1
          fi

  docs:
    name: docs site (mkdocs build --strict)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      # Pin to the 9.x line; MkDocs/Material 2.0 is a backward-incompatible rewrite.
      - name: Install MkDocs
        run: pip install "mkdocs-material>=9.5,<10"

      # --strict fails the build on broken navigation or internal links, so the
      # published site is always consistent.
      - name: Build the docs site
        run: mkdocs build --strict

  actionlint:
    name: actionlint (workflow lint)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7

      # actionlint validates the workflow files themselves (for example, the
      # `secrets` context is not allowed in an `if:`), and runs shellcheck —
      # preinstalled on the runner — over every `run:` script.
      - name: Lint workflows
        run: actionlint -color

      # Every THIRD-PARTY action must be pinned by an immutable commit SHA, not a
      # mutable tag (SUPPLY-002). The self-test proves the guard catches a
      # floating-tag regression; the guard itself fails CI if any workflow drifts.
      - name: Verify third-party actions are SHA-pinned (not floating tags)
        run: |
          bash scripts/ci/check-actions-pinned_selftest.sh
          bash scripts/ci/check-actions-pinned.sh .

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 20 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      # Reachability-aware vulnerability scan: fails only on vulnerabilities the
      # code can actually reach (call-graph), not every advisory in the graph.
      # Pinned to a fixed version so the gate is deterministic (not the moving
      # @latest).
      - name: Install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

  supply-chain:
    name: supply-chain (SBOM + binary SCA)
    runs-on: ubuntu-latest
    timeout-minutes: 25 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      # A CycloneDX SBOM of the Go module graph, complementing the image SBOM the
      # release pipeline attaches. The generator is pinned for reproducibility.
      - name: Generate module SBOM (CycloneDX)
        run: make sbom

      - name: Upload module SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-module-cyclonedx
          path: sbom.module.cyclonedx.json

      # Verify and scan the embedded-postgres runtime binary (PostgreSQL pulled
      # from Maven Central — it lives outside go.sum): checksum-pin against the
      # committed provenance manifest (hard fail on any change), then Trivy-scan
      # the extracted binaries via Trivy's pinned official image (Docker is
      # preinstalled on the runner — no flaky installer).
      - name: Verify & scan the embedded-postgres binary
        run: bash scripts/supply-chain/verify-embedded-postgres.sh

  helm:
    name: helm (lint + render + schema)
    runs-on: ubuntu-latest
    timeout-minutes: 20 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.16.4

      # Lint the control-plane chart with the required external-datastore values.
      - name: Helm lint
        run: |
          helm lint deploy/helm/trstctl \
            --set postgres.dsn='postgres://u:p@pg:5432/trstctl?sslmode=require' \
            --set nats.url='nats://nats:4222' --set kek.generate=true

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      # Schema-validate the rendered manifests against the Kubernetes API schemas.
      - name: Install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@v0.6.7

      - name: Render + schema-validate the chart
        run: |
          helm template trstctl deploy/helm/trstctl --namespace trstctl \
            --set postgres.dsn='postgres://u:p@pg:5432/trstctl?sslmode=require' \
            --set nats.url='nats://nats:4222' --set kek.generate=true \
            | kubeconform -strict -summary -ignore-missing-schemas

  proto:
    name: proto (buf lint + breaking-change gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Full history so `buf breaking --against '.git#branch=main'` can resolve
          # the baseline contract to diff against.
          fetch-depth: 0

      - name: Install buf (pinned)
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          version: 1.47.2
          setup_only: true

      # Lint the signer proto and fail the build on a wire-incompatible change to the
      # control-plane↔signer gRPC contract (AN-4): a removed/renumbered field, a
      # changed type, a removed RPC/message/enum. Additive changes pass.
      - name: buf lint
        run: buf lint

      - name: buf breaking (against main)
        run: buf breaking --against '.git#branch=main'

  acme-conformance:
    name: acme conformance (Pebble differential)
    runs-on: ubuntu-latest
    timeout-minutes: 25 # TEST-004 (spins up the Pebble service)
    services:
      # Pebble is the reference test ACME CA. The same RFC 8555 protocol-
      # conformance routine that runs against trstctl in the unit suite runs here
      # against Pebble — a divergence in trstctl's protocol surface from the
      # reference surfaces as a test failure.
      pebble:
        # ghcr.io/letsencrypt/pebble:2.10.1 — the reference test ACME CA, pinned by
        # digest. GHCR publishes un-prefixed tags and never carried v2.6.0; 2.10.1 is
        # the current published release.
        image: ghcr.io/letsencrypt/pebble:2.10.1@sha256:ddf230642b1a584f519f32e347de1b05a6e4c1f6c35c1863b33effeab5f78199
        env:
          PEBBLE_VA_NOSLEEP: "1"
        ports:
          - 14000:14000
          - 15000:15000
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      # Pebble serves its ACME directory over HTTPS with a fixed test CA
      # (pebble.minica.pem, baked into the pinned image); trust it so the default
      # client can reach the directory. No crypto/tls in the test itself (AN-3) —
      # SSL_CERT_FILE makes Go's standard pool trust Pebble's CA.
      - name: Trust Pebble's test CA
        run: curl -fsSL "https://raw.githubusercontent.com/letsencrypt/pebble/v2.10.1/test/certs/pebble.minica.pem" -o "${RUNNER_TEMP}/pebble-ca.pem"

      - name: Wait for Pebble to be ready
        run: |
          for _ in $(seq 1 30); do
            if curl -fsk https://localhost:14000/dir >/dev/null 2>&1; then echo "pebble ready"; exit 0; fi
            sleep 1
          done
          echo "::error::Pebble did not become ready"; exit 1

      - name: ACME protocol differential vs Pebble
        env:
          PEBBLE_DIRECTORY_URL: https://localhost:14000/dir
          SSL_CERT_FILE: ${{ runner.temp }}/pebble-ca.pem
        run: go test ./internal/protocols/acme/ -run TestACMEProtocolDifferentialVsPebble -count=1 -v

  acme-stock-client-conformance:
    name: acme stock-client conformance (certbot transcript)
    runs-on: ubuntu-latest
    timeout-minutes: 20 # INTEROP-004 (stock certbot issue/renew/revoke transcript)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install pinned certbot client
        run: |
          python3 -m venv "${RUNNER_TEMP}/certbot-venv"
          "${RUNNER_TEMP}/certbot-venv/bin/python" -m pip install 'certbot==5.6.0'
          echo "${RUNNER_TEMP}/certbot-venv/bin" >> "${GITHUB_PATH}"

      - name: certbot issue renew revoke against served ACME endpoint
        env:
          TRSTCTL_REQUIRE_CERTBOT: "1"
          TRSTCTL_INTEROP_TRANSCRIPT_DIR: ${{ runner.temp }}/interop-transcripts
        run: |
          command -v certbot
          mkdir -p "${TRSTCTL_INTEROP_TRANSCRIPT_DIR}"
          go test ./internal/protocols/acme -run 'TestACMECertbotManualDNSIssueRenewRevoke|TestArchiveACMEConformanceTranscriptsWritesPublicFiles' -count=1 -v

      - name: Upload ACME certbot conformance transcripts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: acme-certbot-transcripts
          path: ${{ runner.temp }}/interop-transcripts
          if-no-files-found: error

  cmp-client-conformance:
    name: cmp client conformance (OpenSSL transcript)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # INTEROP-003 (stock OpenSSL cmp p10cr transcript)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify OpenSSL CMP client is available
        run: |
          openssl version
          openssl cmp -help >/dev/null

      - name: OpenSSL cmp p10cr against served CMP endpoint
        env:
          TRSTCTL_REQUIRE_OPENSSL_CMP: "1"
          TRSTCTL_INTEROP_TRANSCRIPT_DIR: ${{ runner.temp }}/interop-transcripts
        run: |
          mkdir -p "${TRSTCTL_INTEROP_TRANSCRIPT_DIR}"
          go test ./internal/protocols/cmp -run 'TestCMPOpenSSLClientP10CREnrollment|TestOpenSSLCMPP10CRRequestParses' -count=1 -v

      - name: Upload CMP conformance transcripts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cmp-openssl-p10cr-transcripts
          path: ${{ runner.temp }}/interop-transcripts
          if-no-files-found: error

  tsa-client-conformance:
    name: tsa client conformance (OpenSSL ts transcript)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # INTEROP-005 (stock OpenSSL ts query/verify transcript)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify OpenSSL ts client is available
        run: |
          openssl version
          openssl ts -help >/dev/null

      - name: OpenSSL ts query verify against served TSA endpoint
        env:
          TRSTCTL_REQUIRE_OPENSSL_TSA: "1"
          TRSTCTL_INTEROP_TRANSCRIPT_DIR: ${{ runner.temp }}/interop-transcripts
        run: |
          mkdir -p "${TRSTCTL_INTEROP_TRANSCRIPT_DIR}"
          go test ./internal/tsa ./internal/server -run 'TestTimeStampHTTPPostOpenSSLTSVerify|TestServedTSAOpenSSLTimestampOverHTTP' -count=1 -v

      - name: Upload TSA OpenSSL ts conformance transcripts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tsa-openssl-ts-transcripts
          path: ${{ runner.temp }}/interop-transcripts
          if-no-files-found: error

  scep-client-conformance:
    name: scep client conformance (sscep transcript)
    runs-on: ubuntu-latest
    timeout-minutes: 15 # INTEROP-003 (stock sscep enrollment transcript)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install sscep build prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake libssl-dev

      - name: Build pinned sscep client
        run: bash scripts/ci/install-sscep.sh "${RUNNER_TEMP}/sscep"

      - name: sscep enroll against served SCEP endpoint
        env:
          TRSTCTL_REQUIRE_SSCEP: "1"
          TRSTCTL_INTEROP_TRANSCRIPT_DIR: ${{ runner.temp }}/interop-transcripts
        run: |
          export PATH="${RUNNER_TEMP}/sscep/bin:${PATH}"
          command -v sscep
          mkdir -p "${TRSTCTL_INTEROP_TRANSCRIPT_DIR}"
          go test ./internal/protocols/scep -run 'TestSCEPSSCEPClientEnrollment|TestArchiveSCEPConformanceTranscriptsWritesAllFiles' -count=1 -v

      - name: Upload SCEP conformance transcripts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scep-sscep-enroll-transcripts
          path: ${{ runner.temp }}/interop-transcripts
          if-no-files-found: error

  compose-e2e:
    name: compose e2e + PKI conformance (EXC-GATE-01)
    runs-on: ubuntu-latest
    timeout-minutes: 30 # TEST-004 (stands up the full eval stack)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      # No host-side trstctl build: the bootstrap API token is minted INSIDE the
      # running control-plane container (the compose Postgres has no host port), so the
      # gate needs only docker + curl + jq + openssl, all present on the runner.
      - name: Bring up the served eval stack
        run: |
          # --build so we exercise THIS commit's image, not a stale pulled :latest.
          docker compose -f deploy/docker/docker-compose.yml up -d --build
          # Fail loud: poll /readyz and, if the control plane never serves within the
          # budget, dump the stack logs and FAIL the job (do not silently proceed to a
          # curl that connection-refuses). The control plane self-heals a first-boot
          # signer/KEK race via restart:on-failure, so allow generous time.
          ready=""
          for _ in $(seq 1 90); do
            if curl -fsk https://localhost:8443/readyz >/dev/null 2>&1; then ready=1; echo "control plane ready"; break; fi
            sleep 2
          done
          if [ -z "$ready" ]; then
            echo "::error::control plane did not serve /readyz within the budget"
            docker compose -f deploy/docker/docker-compose.yml ps
            docker compose -f deploy/docker/docker-compose.yml logs --no-color --tail=300
            exit 1
          fi
      - name: Issuance lifecycle e2e (issue -> idempotent retry -> revoke -> ACME/OCSP/cacerts)
        env:
          BASE_URL: https://localhost:8443
        run: bash scripts/ci/compose-e2e.sh
      - name: PKI profile conformance (zlint on the served issuing CA)
        run: |
          go install github.com/zmap/zlint/v3/cmd/zlint@v3.6.0
          # served-ca.pem is the issuing CA chain the deployment serves over EST
          # /cacerts, written by the e2e step above. Lint it for RFC 5280 X.509
          # well-formedness — NOT CABForum public-CA policy, which an internal eval CA
          # is not required to meet (gating on CABF lints would false-fail a valid
          # private CA).
          if [ ! -s served-ca.pem ]; then echo "::error::no served CA chain to lint"; exit 1; fi
          zlint -includeSources RFC5280 -prettyprint served-ca.pem | tee zlint.out
          if grep -Eq '"result":[[:space:]]*"error"' zlint.out; then
            echo "::error::zlint reported RFC5280 error-level findings on the served CA"; exit 1
          fi
      - name: Dump compose logs on failure
        if: failure()
        run: |
          docker compose -f deploy/docker/docker-compose.yml ps || true
          docker compose -f deploy/docker/docker-compose.yml logs --no-color --tail=400 || true
      - name: Tear down
        if: always()
        run: docker compose -f deploy/docker/docker-compose.yml down -v || true

  windows-build:
    name: windows cross-build
    runs-on: ubuntu-latest
    timeout-minutes: 20 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      # Cross-compile and vet the whole module for Windows so the CryptoAPI
      # certificate store and the Service Control Manager integration are kept
      # building. The agent's Windows binary and signed MSI are produced by the
      # release pipeline (make dist-windows), not on every PR.
      - name: Cross-build for Windows (amd64)
        run: make windows-build

  # FIPS-capable build gate (PKIGOV-007 / EXC-CRYPTO-01). It builds all three
  # binaries with the Go FIPS 140-3 Cryptographic Module enabled (GOFIPS140), then
  # PROVES the produced binary actually has the module active (not merely that it
  # compiled) and that the --fips power-on self-test boots cleanly. It also runs
  # the internal/crypto FIPS suite under the FIPS build so the required+active POST
  # path is exercised. This is FIPS-*capable* (validated Go module); the trstctl
  # product NIST CMVP certificate is a separate, external process named in
  # docs/compliance.md and is NOT asserted here.
  fips-build:
    name: fips-capable build (GOFIPS140)
    runs-on: ubuntu-latest
    timeout-minutes: 20 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # version stamping

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      # Builds all three binaries with GOFIPS140=latest and self-verifies the
      # control plane reports `crypto.fips.module_active: true` (fails the job
      # otherwise — a build whose module is inactive is not FIPS-capable).
      - name: FIPS-capable build (+ verify module active)
        run: make fips-build

      # The required+active power-on self-test path: under the FIPS module,
      # PowerOnSelfTest(required=true) must pass. The non-FIPS fail-closed path is
      # covered by the default build/test job above.
      - name: FIPS power-on self-test suite (module active)
        env:
          GOFIPS140: latest
        run: go test ./internal/crypto/ -run 'TestPowerOnSelfTest|TestSelfTestKAT|TestFIPSStatus' -count=1 -v

  windows:
    name: windows / test + MSI
    runs-on: windows-latest
    timeout-minutes: 40 # TEST-004 (native Windows build + WiX MSI is slow)
    env:
      # Surface the code-signing secret to job-level env so it can drive the
      # step `if:` gates below (the `secrets` context is not allowed in `if:`,
      # and a step `if:` cannot see that step's own `env:`). Same pattern the
      # release/image job uses for the Docker Hub mirror credentials.
      WINDOWS_CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
      WINDOWS_CODESIGN_PASS: ${{ secrets.WINDOWS_CODESIGN_PASS }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Build
        run: go build ./...

      # Run the Windows-specific surface natively: the agent — including the
      # real CryptoAPI certificate store, which installs into the per-user store
      # and asserts the key association — the destinations, the release checksum
      # helper, and the crypto boundary. The PostgreSQL/NATS integration tests
      # stay on the Linux job.
      - name: Test (Windows agent surface, incl. real certificate store)
        run: go test ./internal/agent/... ./internal/dist/... ./internal/crypto/...

      - name: Build MSI (WiX v3)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -o dist\trstctl-agent.exe .\cmd\trstctl-agent
          choco install wixtoolset --no-progress -y
          $wixDir = Get-ChildItem 'C:\Program Files (x86)' -Directory -Filter 'WiX Toolset *' |
            Sort-Object Name -Descending | Select-Object -First 1
          $bin = Join-Path $wixDir.FullName 'bin'
          Copy-Item deploy\windows\trstctl-agent.wxs dist\trstctl-agent.wxs
          & "$bin\candle.exe" -arch x64 -out dist\ dist\trstctl-agent.wxs
          & "$bin\light.exe" -b dist -out dist\trstctl-agent.msi dist\trstctl-agent.wixobj
          Get-ChildItem dist

      # Authenticode-sign the agent .exe and .msi with signtool when the
      # code-signing identity is configured (SUPPLY-001). The PKCS#12 is provisioned
      # from repo secrets; when absent the artifacts stay unsigned with a warning so
      # a fork still builds. The signature is verified before the checksums are
      # published so SHA256SUMS covers the SIGNED bytes.
      - name: Authenticode-sign the agent (.exe + .msi)
        if: ${{ env.WINDOWS_CODESIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CODESIGN_PFX_BASE64))
          $signtool = (Get-ChildItem 'C:\Program Files (x86)\Windows Kits\10\bin' -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64' } | Sort-Object FullName -Descending | Select-Object -First 1).FullName
          foreach ($art in 'dist\trstctl-agent.exe', 'dist\trstctl-agent.msi') {
            & $signtool sign /f $pfx /p $env:WINDOWS_CODESIGN_PASS /fd SHA256 `
              /tr http://timestamp.digicert.com /td SHA256 /d 'trstctl agent' $art
            & $signtool verify /pa $art
          }
          Remove-Item $pfx -Force

      - name: Warn when the agent is unsigned (no signing identity configured)
        if: ${{ env.WINDOWS_CODESIGN_PFX_BASE64 == '' }}
        shell: pwsh
        run: |
          Write-Host '::warning::WINDOWS_CODESIGN_PFX_BASE64 is not set; the Windows agent .exe/.msi are UNSIGNED in this CI build. Provision the secret to Authenticode-sign them.'

      - name: Publish SHA-256 sums
        shell: pwsh
        run: |
          Get-FileHash dist\trstctl-agent.exe, dist\trstctl-agent.msi -Algorithm SHA256 |
            ForEach-Object { '{0}  {1}' -f $_.Hash.ToLower(), (Split-Path $_.Path -Leaf) } |
            Tee-Object -FilePath dist\SHA256SUMS

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trstctl-agent-windows
          path: |
            dist/trstctl-agent.exe
            dist/trstctl-agent.msi
            dist/SHA256SUMS

  kubernetes:
    name: kubernetes / kind e2e
    runs-on: ubuntu-latest
    timeout-minutes: 40 # TEST-004 (provisions a kind cluster + cert-manager CRDs)
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: trstctl-e2e

      # Install the cert-manager API (CRDs). The bridge is the external issuer
      # for our CertificateRequests, so it is exercised against the real
      # cert-manager resource types on a real API server; cert-manager's own
      # controllers/approval webhook are a separate concern (see the PR notes).
      - name: Install cert-manager CRDs
        run: |
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.16.2/cert-manager.crds.yaml
          kubectl wait --for=condition=Established --timeout=60s crd/certificaterequests.cert-manager.io

      - name: Provision agent RBAC and an admin token for fixtures
        run: |
          kubectl apply -f deploy/kubernetes/namespace.yaml
          kubectl apply -f deploy/kubernetes/rbac.yaml
          kubectl -n trstctl create serviceaccount trstctl-e2e-admin
          kubectl create clusterrolebinding trstctl-e2e-admin --clusterrole=cluster-admin --serviceaccount=trstctl:trstctl-e2e-admin

      - name: Run the in-cluster e2e (secret write + cert-manager bridge)
        shell: bash
        run: |
          set -euo pipefail
          # Assign then export separately so a command substitution failure is
          # not masked by export's exit status (shellcheck SC2155).
          K8S_SERVER="$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')"
          # Agent token: the restricted identity the code under test uses.
          K8S_TOKEN="$(kubectl -n trstctl create token trstctl-agent --duration=1h)"
          # Admin token: test fixtures and verification (the agent SA cannot
          # create CertificateRequests, by design).
          K8S_ADMIN_TOKEN="$(kubectl -n trstctl create token trstctl-e2e-admin --duration=1h)"
          K8S_CA_FILE="$(mktemp)"
          kubectl config view --minify --raw -o jsonpath='{.clusters[0].cluster.certificate-authority-data}' | base64 -d > "$K8S_CA_FILE"
          K8S_NAMESPACE="trstctl"
          export K8S_SERVER K8S_TOKEN K8S_ADMIN_TOKEN K8S_CA_FILE K8S_NAMESPACE
          go test -tags e2e -count=1 -v ./test/e2e/kubernetes/...

      - name: Diagnostics on failure
        if: failure()
        run: kubectl get certificaterequests,secrets -A || true
