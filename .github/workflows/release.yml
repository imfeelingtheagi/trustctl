name: Release

# Build, sign, and publish the trstctl control-plane image on a version tag:
# a reproducible distroless image (under 80 MB), pushed to GHCR (primary) with a
# Docker Hub mirror, carrying a CycloneDX SBOM and a keyless cosign signature.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/${{ vars.DOCKERHUB_ORG || 'trstctl' }}/trstctl
  # Image size budget. Three static Go binaries (control plane + signer + the
  # in-network agent) plus the embedded web UI land well under this budget today;
  # the single multi-binary image serves every topology (the agent DaemonSet runs
  # trstctl-agent from it via an entrypoint override — OPS-002). The 80 MB budget
  # gives Phase-2 headroom while still catching accidental bloat (a debug image,
  # stray files in context).
  MAX_IMAGE_BYTES: "83886080"

jobs:
  # Re-run the full test suite against the EXACT tagged ref before anything is
  # built, signed, or published (TEST-005). The release triggers on a tag push (or
  # manual dispatch), which can point at a commit whose CI was red, never finished,
  # or was bypassed (TEST-006) — so "CI ran on main earlier" is not a guarantee for
  # this ref. For a root-of-trust product, nothing ships off an untested SHA. The
  # publishing jobs below also need `required-checks`, which verifies that the
  # branch-protection required CI/security contexts are green for this commit before
  # any artifact is emitted (TEST-003).
  test:
    name: re-run test suite (gate the release)
    runs-on: ubuntu-latest
    timeout-minutes: 40 # TEST-004
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so `git describe` can stamp the version

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Build (all three binaries)
        run: make build

      - name: Smoke test (--version boots and exits cleanly)
        run: ./bin/trstctl --version

      # SURFACE-001/006: the release artifact MUST embed a real Vite build of the
      # console, never the dead "not built" placeholder. The committed
      # internal/webui/dist is embedded by `go build` above; this gate fails the
      # release before any image is built/signed/pushed if that embed is the placeholder.
      - name: Embedded UI is a real build (release gate)
        env:
          TRSTCTL_REQUIRE_BUILT_UI: "1"
        run: go test ./internal/webui/...

      - name: Test (race + coverage floors against the tagged ref)
        run: make test

  required-checks:
    name: required checks / live CI preflight
    runs-on: ubuntu-latest
    timeout-minutes: 25 # TEST-003 (waits for full CI/security contexts on the tag SHA)
    permissions:
      contents: read
      checks: read
      statuses: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Verify required CI/security checks are green for this commit
        env:
          GH_TOKEN: ${{ github.token }}
          TRSTCTL_REQUIRED_CHECKS_ATTEMPTS: "60"
          TRSTCTL_REQUIRED_CHECKS_SLEEP_SECONDS: "20"
        run: scripts/ci/verify-required-checks.sh

  image:
    name: build / sign / publish
    runs-on: ubuntu-latest
    timeout-minutes: 40 # TEST-004 (multi-arch build + sign + SBOM)
    outputs:
      slsa_subjects: ${{ steps.slsa_subjects.outputs.encoded }}
    permissions:
      contents: read
      packages: write # push to GHCR
      id-token: write # keyless cosign signing via OIDC
    # Do not build/sign/publish off an untested ref (TEST-005) or a commit whose
    # broader required CI/security surface is red or missing (TEST-003).
    needs: [test, required-checks]
    env:
      # Surface the Docker Hub mirror credentials as env vars so they can be used
      # in an `if:` condition — the `secrets` context is not allowed there.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history for `git describe` and commit timestamps

      - name: Resolve reproducible build metadata
        id: meta
        run: |
          {
            echo "version=$(git describe --tags --always --dirty)"
            echo "commit=$(git rev-parse --short=12 HEAD)"
            echo "date=$(git show -s --format=%cI HEAD)"
          } >> "$GITHUB_OUTPUT"
          # Pin file/layer timestamps to the commit for a reproducible image.
          echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Resolve and record container base images by digest
        id: basedigest
        run: |
          # Pin both external Dockerfile bases to immutable digests so the
          # released image cannot silently inherit a changed Go builder or runtime
          # base (SUPPLY-001).
          go_version="$(awk '/^toolchain / {sub(/^go/, "", $2); print $2}' go.mod)"
          build_base="golang:${go_version}-bookworm"
          runtime_base="gcr.io/distroless/static-debian12:nonroot"
          build_digest="$(docker buildx imagetools inspect "$build_base" --format '{{.Manifest.Digest}}')"
          runtime_digest="$(docker buildx imagetools inspect "$runtime_base" --format '{{.Manifest.Digest}}')"
          build_ref="golang@${build_digest}"
          runtime_ref="gcr.io/distroless/static-debian12@${runtime_digest}"
          echo "build_ref=${build_ref}" >> "$GITHUB_OUTPUT"
          echo "runtime_ref=${runtime_ref}" >> "$GITHUB_OUTPUT"
          echo ">> pinned Go builder base: ${build_ref}"
          echo ">> pinned distroless runtime base: ${runtime_ref}"
          {
            echo "### Pinned container base images"
            echo ""
            echo "- build: \`${build_ref}\`"
            echo "- runtime: \`${runtime_ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to GHCR (primary)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (mirror)
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build amd64 image locally for the size check
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          load: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
            BUILD_IMAGE=${{ steps.basedigest.outputs.build_ref }}
            BASE_IMAGE=${{ steps.basedigest.outputs.runtime_ref }}
          tags: trstctl:sizecheck

      - name: Enforce the image size budget
        run: |
          size=$(docker image inspect trstctl:sizecheck --format '{{.Size}}')
          echo "image size: ${size} bytes (budget ${MAX_IMAGE_BYTES})"
          if [ "$size" -gt "${MAX_IMAGE_BYTES}" ]; then
            echo "::error::image is ${size} bytes, over the ${MAX_IMAGE_BYTES}-byte budget"
            exit 1
          fi

      - name: Compute image tags
        id: tags
        run: |
          # GHCR is the primary; the Docker Hub mirror is added only when its
          # credentials are configured, so a GHCR-only release still succeeds.
          tags="${GHCR_IMAGE}:${{ steps.meta.outputs.version }},${GHCR_IMAGE}:latest"
          if [ -n "${DOCKERHUB_TOKEN}" ]; then
            tags="${tags},${DOCKERHUB_IMAGE}:${{ steps.meta.outputs.version }},${DOCKERHUB_IMAGE}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push (reproducible, multi-arch)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
            BUILD_IMAGE=${{ steps.basedigest.outputs.build_ref }}
            BASE_IMAGE=${{ steps.basedigest.outputs.runtime_ref }}
          # Rewrite layer timestamps to SOURCE_DATE_EPOCH for reproducibility.
          outputs: type=image,rewrite-timestamp=true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Render Kubernetes agent DaemonSet manifest
        run: |
          mkdir -p dist/kubernetes
          scripts/release/render-kubernetes-agent-daemonset.sh "${GHCR_IMAGE}@${{ steps.build.outputs.digest }}" \
            > dist/kubernetes/trstctl-agent-daemonset.yaml

      - name: Compute SLSA subjects (image + agent manifest)
        id: slsa_subjects
        run: |
          set -euo pipefail
          subject_file="${RUNNER_TEMP}/trstctl-container.subjects"
          scripts/release/slsa-subjects.sh image "$subject_file" \
            "${GHCR_IMAGE}@${{ steps.build.outputs.digest }}" \
            "${{ steps.build.outputs.digest }}" \
            dist/kubernetes/trstctl-agent-daemonset.yaml
          echo "encoded=$(scripts/release/slsa-subjects.sh encode "$subject_file")" >> "$GITHUB_OUTPUT"

      - name: Upload Kubernetes agent manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trstctl-agent-kubernetes
          path: dist/kubernetes/trstctl-agent-daemonset.yaml

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Sign image and attest the SBOM (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          digest='${{ steps.build.outputs.digest }}'
          # Sign by digest in GHCR, and in the Docker Hub mirror when configured
          # (the digest is identical across registries).
          cosign sign "${GHCR_IMAGE}@${digest}"
          if [ -n "${DOCKERHUB_TOKEN}" ]; then
            cosign sign "${DOCKERHUB_IMAGE}@${digest}"
          fi
          cosign attest --yes --predicate sbom.cyclonedx.json --type cyclonedx "${GHCR_IMAGE}@${digest}"

  image-provenance:
    name: slsa / container and manifest provenance
    needs: [image]
    permissions:
      contents: write # Upload the in-toto provenance to the tag's GitHub Release.
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.image.outputs.slsa_subjects }}
      provenance-name: trstctl-container-and-manifest.intoto.jsonl
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}

  # The privileged agent runs as a LocalSystem Windows service / root systemd unit
  # on customer infrastructure and holds an mTLS identity to the control plane, so
  # its release artifacts must be authenticated, not just shipped (SUPPLY-001). This
  # job builds the Windows agent .exe + .msi via the same `make dist-windows` path
  # used locally, Authenticode-signs BOTH through an operator-owned remote signer
  # authenticated by GitHub OIDC, publishes the SHA-256 sums, and uploads everything
  # as durable GitHub Release assets. The signer keeps its code-signing key in an HSM/cloud signing
  # boundary; no long-lived PKCS#12 secret is materialized on the runner.
  agent-windows:
    name: agent / windows sign + publish
    runs-on: ubuntu-latest
    timeout-minutes: 30 # TEST-004
    outputs:
      slsa_subjects: ${{ steps.slsa_subjects.outputs.encoded }}
    permissions:
      contents: write # create/update the tag's GitHub Release assets
      id-token: write # remote Authenticode signer authenticates this job by OIDC
    environment: windows-code-signing
    # Do not build/sign/publish the privileged agent off an untested ref (TEST-005)
    # or a commit whose broader required CI/security surface is red or missing
    # (TEST-003).
    needs: [test, required-checks]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install Authenticode verification + MSI toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq osslsigncode msitools

      - name: Build, sign, and checksum the Windows agent (.exe + .msi)
        env:
          # make dist-windows invokes scripts/ci/sign-windows-artifact-oidc.sh for
          # both artifacts when this URL is set. The remote service must validate
          # the GitHub OIDC token audience before signing in its HSM/cloud boundary.
          WINDOWS_CODESIGN_URL: ${{ vars.WINDOWS_CODESIGN_URL }}
          WINDOWS_CODESIGN_AUDIENCE: ${{ vars.WINDOWS_CODESIGN_AUDIENCE || 'trstctl-windows-codesign' }}
        run: |
          set -euo pipefail
          if [ -z "${WINDOWS_CODESIGN_URL}" ]; then
            echo "::error::WINDOWS_CODESIGN_URL is required for release Windows signing. Configure the protected windows-code-signing environment to point at the remote Authenticode signer."
            exit 1
          fi
          make dist-windows

      - name: Verify the signatures (Authenticode)
        run: |
          set -euo pipefail
          for art in dist/trstctl-agent.exe dist/trstctl-agent.msi; do
            [ -f "$art" ] || continue
            echo ">> verifying Authenticode signature on $art"
            osslsigncode verify -in "$art"
          done

      - name: Verify the checksum manifest
        run: |
          set -euo pipefail
          for art in dist/trstctl-agent.exe dist/trstctl-agent.msi dist/SHA256SUMS; do
            test -s "$art"
          done
          ( cd dist && sha256sum -c SHA256SUMS )

      - name: Compute SLSA subjects (Windows agent assets)
        id: slsa_subjects
        run: |
          set -euo pipefail
          subject_file="${RUNNER_TEMP}/trstctl-agent-windows.subjects"
          scripts/release/slsa-subjects.sh files "$subject_file" \
            dist/trstctl-agent.exe \
            dist/trstctl-agent.msi \
            dist/SHA256SUMS
          echo "encoded=$(scripts/release/slsa-subjects.sh encode "$subject_file")" >> "$GITHUB_OUTPUT"

      - name: Verify usability release evidence
        run: python3 scripts/usability/verify-release-evidence.py --release-notes-text "trstctl ${GITHUB_REF_NAME}"

      - name: Publish Windows agent GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::Windows release assets can only be published from a tag ref, got ${GITHUB_REF_TYPE} ${GITHUB_REF_NAME}."
            exit 1
          fi
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --notes "trstctl $GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" \
            dist/trstctl-agent.exe \
            dist/trstctl-agent.msi \
            dist/SHA256SUMS \
            --clobber

      - name: Verify GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          assets="$(gh release view "$GITHUB_REF_NAME" --json assets --jq '.assets[].name')"
          for name in trstctl-agent.exe trstctl-agent.msi SHA256SUMS; do
            if ! grep -qx "$name" <<<"$assets"; then
              echo "::error::GitHub Release $GITHUB_REF_NAME is missing Windows asset $name"
              exit 1
            fi
          done

  windows-agent-provenance:
    name: slsa / windows agent provenance
    needs: [agent-windows]
    permissions:
      contents: write
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.agent-windows.outputs.slsa_subjects }}
      provenance-name: trstctl-agent-windows.intoto.jsonl
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}

  # Package the control-plane Helm chart and SIGN it so an operator can verify the
  # chart's provenance before installing the root-of-trust control plane (SUPPLY-007).
  # We push the packaged chart as an OCI artifact to GHCR and cosign-sign it keyless
  # (the same OIDC identity that signs the image), so `cosign verify` validates the
  # chart with the documented identity regexp. Gated on the test suite and required
  # CI/security contexts like every other publishing job (TEST-003/005).
  helm-chart:
    name: helm chart / package + sign
    runs-on: ubuntu-latest
    timeout-minutes: 20 # TEST-004
    needs: [test, required-checks]
    outputs:
      slsa_subjects: ${{ steps.slsa_subjects.outputs.encoded }}
    permissions:
      contents: read
      packages: write # push chart OCI artifact to GHCR
      id-token: write # keyless cosign signing via OIDC
    env:
      CHART_OCI: oci://ghcr.io/${{ github.repository }}/charts
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.16.4

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package the chart
        id: pkg
        run: |
          set -euo pipefail
          helm package deploy/helm/trstctl --destination dist
          tgz="$(ls dist/trstctl-*.tgz)"
          echo "tgz=${tgz}" >> "$GITHUB_OUTPUT"
          # Publish the chart's SHA-256 alongside it (a fork without GHCR push can
          # still verify the artifact bytes against this digest).
          ( cd dist && sha256sum "$(basename "$tgz")" > "$(basename "$tgz").sha256" )

      - name: Compute SLSA subjects (Helm chart assets)
        id: slsa_subjects
        run: |
          set -euo pipefail
          subject_file="${RUNNER_TEMP}/trstctl-helm-chart.subjects"
          scripts/release/slsa-subjects.sh files "$subject_file" \
            "${{ steps.pkg.outputs.tgz }}" \
            "${{ steps.pkg.outputs.tgz }}.sha256"
          echo "encoded=$(scripts/release/slsa-subjects.sh encode "$subject_file")" >> "$GITHUB_OUTPUT"

      - name: Push the chart to GHCR (OCI) and cosign-sign it (keyless)
        env:
          COSIGN_YES: "true"
          HELM_EXPERIMENTAL_OCI: "1"
        run: |
          set -euo pipefail
          push_out="$(helm push '${{ steps.pkg.outputs.tgz }}' "${CHART_OCI}" 2>&1)"
          echo "${push_out}"
          # helm push prints the pushed Digest; sign the chart by that digest so the
          # signature is bound to the exact bytes (cosign verify <ref> validates it).
          digest="$(echo "${push_out}" | awk '/Digest:/ {print $2}')"
          repo="${CHART_OCI#oci://}/trstctl"
          cosign sign "${repo}@${digest}"

      - name: Upload packaged chart as a release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trstctl-helm-chart
          path: |
            dist/trstctl-*.tgz
            dist/trstctl-*.tgz.sha256

  helm-chart-provenance:
    name: slsa / helm chart provenance
    needs: [helm-chart]
    permissions:
      contents: write
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a # v2.1.0
    with:
      base64-subjects: ${{ needs.helm-chart.outputs.slsa_subjects }}
      provenance-name: trstctl-helm-chart.intoto.jsonl
      upload-assets: true
      upload-tag-name: ${{ github.ref_name }}
