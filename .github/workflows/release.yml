name: Release

# Build, sign, and publish the certctl control-plane image on a version tag:
# a reproducible distroless image (< 20 MB), pushed to GHCR (primary) with a
# Docker Hub mirror, carrying a CycloneDX SBOM and a keyless cosign signature.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # keyless cosign signing via OIDC

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/${{ vars.DOCKERHUB_ORG || 'certctl' }}/certctl
  # Image size budget: the distroless image must stay under 20 MB.
  MAX_IMAGE_BYTES: "20971520"

jobs:
  image:
    name: build / sign / publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for `git describe` and commit timestamps

      - name: Resolve reproducible build metadata
        id: meta
        run: |
          echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
          # Pin file/layer timestamps to the commit for a reproducible image.
          echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (primary)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (mirror)
        if: ${{ secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build amd64 image locally for the size check
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          load: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          tags: certctl:sizecheck

      - name: Enforce the 20 MB image size budget
        run: |
          size=$(docker image inspect certctl:sizecheck --format '{{.Size}}')
          echo "image size: ${size} bytes (budget ${MAX_IMAGE_BYTES})"
          if [ "$size" -gt "${MAX_IMAGE_BYTES}" ]; then
            echo "::error::image is ${size} bytes, over the 20 MB (20971520) budget"
            exit 1
          fi

      - name: Build and push (reproducible, multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
          # Rewrite layer timestamps to SOURCE_DATE_EPOCH for reproducibility.
          outputs: type=image,rewrite-timestamp=true
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:latest

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image and attest the SBOM (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          digest='${{ steps.build.outputs.digest }}'
          # Sign by digest in both registries (the digest is identical across mirrors).
          cosign sign "${GHCR_IMAGE}@${digest}"
          cosign sign "${DOCKERHUB_IMAGE}@${digest}" || echo "Docker Hub mirror not configured; skipping"
          cosign attest --yes --predicate sbom.cyclonedx.json --type cyclonedx "${GHCR_IMAGE}@${digest}"
