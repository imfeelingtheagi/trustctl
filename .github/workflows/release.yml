name: Release

# Build, sign, and publish the trustctl control-plane image on a version tag:
# a reproducible distroless image (under 80 MB), pushed to GHCR (primary) with a
# Docker Hub mirror, carrying a CycloneDX SBOM and a keyless cosign signature.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to GHCR
  id-token: write # keyless cosign signing via OIDC

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: docker.io/${{ vars.DOCKERHUB_ORG || 'trustctl' }}/trustctl
  # Image size budget. Three static Go binaries (control plane + signer + the
  # in-network agent) plus the embedded web UI land well under this budget today;
  # the single multi-binary image serves every topology (the agent DaemonSet runs
  # trustctl-agent from it via an entrypoint override — OPS-002). The 80 MB budget
  # gives Phase-2 headroom while still catching accidental bloat (a debug image,
  # stray files in context).
  MAX_IMAGE_BYTES: "83886080"

jobs:
  # Re-run the full test suite against the EXACT tagged ref before anything is
  # built, signed, or published (TEST-005). The release triggers on a tag push (or
  # manual dispatch), which can point at a commit whose CI was red, never finished,
  # or was bypassed (TEST-006) — so "CI ran on main earlier" is not a guarantee for
  # this ref. For a root-of-trust product, nothing ships off an untested SHA: the
  # publishing jobs below `needs: test`, so a failing suite fails the release before
  # any artifact is built or pushed. This mirrors the Linux build/test leg of ci.yml
  # (the same `make build` + `make test` against embedded Postgres + in-process
  # NATS) and is the release-time quality gate the audit's anti-vacuous-green
  # discipline requires (never ship off an unverified ref; ratchet up, never down).
  test:
    name: re-run test suite (gate the release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so `git describe` can stamp the version

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Build (all three binaries)
        run: make build

      - name: Smoke test (--version boots and exits cleanly)
        run: ./bin/trustctl --version

      - name: Test (race + coverage floors against the tagged ref)
        run: make test

  image:
    name: build / sign / publish
    runs-on: ubuntu-latest
    # Do not build/sign/publish off an untested ref (TEST-005): block on the suite.
    needs: test
    env:
      # Surface the Docker Hub mirror credentials as env vars so they can be used
      # in an `if:` condition — the `secrets` context is not allowed there.
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history for `git describe` and commit timestamps

      - name: Resolve reproducible build metadata
        id: meta
        run: |
          {
            echo "version=$(git describe --tags --always --dirty)"
            echo "commit=$(git rev-parse --short=12 HEAD)"
            echo "date=$(git show -s --format=%cI HEAD)"
          } >> "$GITHUB_OUTPUT"
          # Pin file/layer timestamps to the commit for a reproducible image.
          echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Resolve and record the distroless base image by digest
        id: basedigest
        run: |
          # Pin the runtime base to an immutable digest so the released image is
          # reproducible and the Dockerfile's claim is true (R4.5). Both image
          # builds below build FROM this exact digest via the BASE_IMAGE arg.
          base="gcr.io/distroless/static-debian12:nonroot"
          digest="$(docker buildx imagetools inspect "$base" --format '{{.Manifest.Digest}}')"
          ref="gcr.io/distroless/static-debian12@${digest}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo ">> pinned distroless base: ${ref}"
          {
            echo "### Pinned distroless base image"
            echo ""
            echo "\`${ref}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to GHCR (primary)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (mirror)
        if: ${{ env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build amd64 image locally for the size check
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          load: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
            BASE_IMAGE=${{ steps.basedigest.outputs.ref }}
          tags: trustctl:sizecheck

      - name: Enforce the image size budget
        run: |
          size=$(docker image inspect trustctl:sizecheck --format '{{.Size}}')
          echo "image size: ${size} bytes (budget ${MAX_IMAGE_BYTES})"
          if [ "$size" -gt "${MAX_IMAGE_BYTES}" ]; then
            echo "::error::image is ${size} bytes, over the ${MAX_IMAGE_BYTES}-byte budget"
            exit 1
          fi

      - name: Compute image tags
        id: tags
        run: |
          # GHCR is the primary; the Docker Hub mirror is added only when its
          # credentials are configured, so a GHCR-only release still succeeds.
          tags="${GHCR_IMAGE}:${{ steps.meta.outputs.version }},${GHCR_IMAGE}:latest"
          if [ -n "${DOCKERHUB_TOKEN}" ]; then
            tags="${tags},${DOCKERHUB_IMAGE}:${{ steps.meta.outputs.version }},${DOCKERHUB_IMAGE}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build and push (reproducible, multi-arch)
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ steps.meta.outputs.commit }}
            DATE=${{ steps.meta.outputs.date }}
            BASE_IMAGE=${{ steps.basedigest.outputs.ref }}
          # Rewrite layer timestamps to SOURCE_DATE_EPOCH for reproducibility.
          outputs: type=image,rewrite-timestamp=true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.GHCR_IMAGE }}:${{ steps.meta.outputs.version }}
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Sign image and attest the SBOM (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          digest='${{ steps.build.outputs.digest }}'
          # Sign by digest in GHCR, and in the Docker Hub mirror when configured
          # (the digest is identical across registries).
          cosign sign "${GHCR_IMAGE}@${digest}"
          if [ -n "${DOCKERHUB_TOKEN}" ]; then
            cosign sign "${DOCKERHUB_IMAGE}@${digest}"
          fi
          cosign attest --yes --predicate sbom.cyclonedx.json --type cyclonedx "${GHCR_IMAGE}@${digest}"

  # The privileged agent runs as a LocalSystem Windows service / root systemd unit
  # on customer infrastructure and holds an mTLS identity to the control plane, so
  # its release artifacts must be authenticated, not just shipped (SUPPLY-001). This
  # job builds the Windows agent .exe + .msi via the same `make dist-windows` path
  # used locally, Authenticode-signs BOTH when the code-signing identity is
  # configured (SIGN_PFX/SIGN_PASS, provisioned from repo secrets), publishes the
  # SHA-256 sums, and uploads everything as release assets. When the signing secret
  # is absent it builds and publishes UNSIGNED with a loud warning (so a fork or a
  # not-yet-provisioned org still gets a release), and — on a real version tag —
  # the verify gate below FAILS the release rather than letting an unsigned
  # privileged binary ship silently.
  agent-windows:
    name: agent / windows sign + publish
    runs-on: ubuntu-latest
    # Do not build/sign/publish the privileged agent off an untested ref (TEST-005).
    needs: test
    env:
      # Surface the signing identity as env so it can drive an `if:` gate (the
      # `secrets` context is not allowed in `if:`) and feed the Makefile.
      SIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
      SIGN_PASS: ${{ secrets.WINDOWS_CODESIGN_PASS }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install Authenticode + MSI toolchain (osslsigncode, msitools)
        run: |
          sudo apt-get update
          sudo apt-get install -y osslsigncode msitools

      - name: Materialize the code-signing PKCS#12 (when configured)
        id: signid
        run: |
          if [ -n "${SIGN_PFX_BASE64}" ]; then
            echo "${SIGN_PFX_BASE64}" | base64 -d > "${RUNNER_TEMP}/codesign.pfx"
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Windows code-signing identity present; the agent .exe and .msi will be Authenticode-signed."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::WINDOWS_CODESIGN_PFX_BASE64 is not set; building the Windows agent UNSIGNED. Provision the secret to sign the release."
          fi

      - name: Build, sign, and checksum the Windows agent (.exe + .msi)
        env:
          # make dist-windows signs both the .exe and the .msi when SIGN_PFX is set.
          SIGN_PFX: ${{ steps.signid.outputs.configured == 'true' && format('{0}/codesign.pfx', runner.temp) || '' }}
        run: make dist-windows

      - name: Verify the signatures (fail the release if a tag ships unsigned)
        run: |
          set -e
          for art in dist/trustctl-agent.exe dist/trustctl-agent.msi; do
            [ -f "$art" ] || continue
            if [ "${{ steps.signid.outputs.configured }}" = "true" ]; then
              echo ">> verifying Authenticode signature on $art"
              osslsigncode verify -in "$art"
            elif [ "${{ github.event_name }}" = "push" ]; then
              # A real version-tag release must not ship an unsigned privileged binary.
              echo "::error::$art is UNSIGNED on a tagged release; set WINDOWS_CODESIGN_PFX_BASE64/WINDOWS_CODESIGN_PASS to sign it."
              exit 1
            else
              echo "::warning::$art is unsigned (manual dispatch without a signing identity)."
            fi
          done

      - name: Upload Windows agent release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trustctl-agent-windows
          path: |
            dist/trustctl-agent.exe
            dist/trustctl-agent.msi
            dist/SHA256SUMS
