// Protocol stub for the isolated signing service (AN-4). This is the wire
// contract the control plane uses to reach trstctl-signer over a Unix domain
// socket (single node) or mTLS (across nodes). It is committed as the reviewed
// protocol design for sprint S1.3; Go code is generated and the service is
// implemented in S1.4.
//
// Design rationale, threat model, and the dependency budget live in
// docs/design/signing-service.md.
syntax = "proto3";

package trstctl.signing.v1;

option go_package = "trstctl.com/trstctl/internal/signing/proto;signerpb";

// SignerService performs all private-key operations inside the sacred signer
// process. Private key material never crosses this boundary: callers receive
// opaque key handles and public keys only.
//
// The service has no HTTP surface and no database access; it speaks only this
// gRPC contract over UDS/mTLS (AN-4).
service SignerService {
  // GenerateKey creates a new private key inside the signer and returns its
  // handle and public key. The private key never leaves the process.
  rpc GenerateKey(GenerateKeyRequest) returns (GenerateKeyResponse);

  // GetPublicKey returns the public key for an existing handle.
  rpc GetPublicKey(GetPublicKeyRequest) returns (GetPublicKeyResponse);

  // Sign produces a signature over a message using the keyed handle.
  rpc Sign(SignRequest) returns (SignResponse);

  // DestroyKey zeroizes and forgets a key handle. It is idempotent.
  rpc DestroyKey(DestroyKeyRequest) returns (DestroyKeyResponse);

  // Health reports liveness and readiness. It returns no secret material.
  rpc Health(HealthRequest) returns (HealthResponse);
}

// Algorithm mirrors internal/crypto.Algorithm.
enum Algorithm {
  ALGORITHM_UNSPECIFIED = 0;
  ALGORITHM_RSA_2048 = 1;
  ALGORITHM_RSA_3072 = 2;
  ALGORITHM_RSA_4096 = 3;
  ALGORITHM_ECDSA_P256 = 4;
  ALGORITHM_ECDSA_P384 = 5;
  ALGORITHM_ECDSA_P521 = 6;
  ALGORITHM_ML_DSA_44 = 7;
  ALGORITHM_ML_DSA_65 = 8;
  ALGORITHM_ML_DSA_87 = 9;
  ALGORITHM_SLH_DSA_SHA2_128S = 10;
  ALGORITHM_SLH_DSA_SHA2_128F = 11;
  ALGORITHM_SLH_DSA_SHA2_192S = 12;
  ALGORITHM_SLH_DSA_SHA2_256S = 13;
}

// Hash mirrors internal/crypto.Hash.
enum Hash {
  HASH_UNSPECIFIED = 0;
  HASH_SHA256 = 1;
  HASH_SHA384 = 2;
  HASH_SHA512 = 3;
}

// RSAPadding mirrors internal/crypto.RSAPadding; ignored for non-RSA keys.
enum RSAPadding {
  RSA_PADDING_UNSPECIFIED = 0; // treated as PKCS#1 v1.5
  RSA_PADDING_PKCS1V15 = 1;
  RSA_PADDING_PSS = 2;
}

// KeyPurpose is a coarse, signer-enforceable usage class for a key (design
// §4.5). A key may be created with an allowed-purpose set; Sign then carries the
// purpose the caller asserts the signature is for, and the signer refuses any
// Sign whose purpose is outside the key's set (FAILED_PRECONDITION). This is the
// one cheap defense-in-depth the signer can enforce against an abused control
// plane: a key minted for, say, leaf TLS cannot be coerced into signing a CA
// cross-sign or an SSH/code-signing certificate. It bounds, but does not
// eliminate, key abuse (which is fully addressed only by HSMs/dual control).
enum KeyPurpose {
  KEY_PURPOSE_UNSPECIFIED = 0; // no purpose asserted; rejected by a constrained key
  KEY_PURPOSE_CA_SIGN = 1;     // sign CA/intermediate/leaf X.509 certificates
  KEY_PURPOSE_LEAF_TLS = 2;    // sign leaf TLS certificates only
  KEY_PURPOSE_SSH_CERT = 3;    // sign SSH certificates
  KEY_PURPOSE_CODE_SIGN = 4;   // produce code-signing signatures
  KEY_PURPOSE_GENERIC = 5;     // unclassified signing (e.g. test/CSR self-sign)
}

// KeyHandle is an opaque, unguessable reference to a private key held by the
// signer. The control plane stores the handle and the public key; it never sees
// the private key bytes.
message KeyHandle {
  string id = 1;
}

message GenerateKeyRequest {
  Algorithm algorithm = 1;
  // Optional caller-chosen handle id for idempotent creation; empty means the
  // signer assigns one.
  string requested_id = 2;
  // allowed_purposes constrains what the key may sign (design §4.5). When
  // non-empty, the signer refuses any Sign whose asserted purpose is not in this
  // set. An empty set means unconstrained (back-compat with pre-constraint
  // callers); the control plane sets a tight set for CA-class keys.
  repeated KeyPurpose allowed_purposes = 3;
  // allowed_hashes optionally constrains which digest algorithms the key may
  // sign. When non-empty, a Sign with a hash outside the set is refused. Empty
  // means any supported hash is allowed.
  repeated Hash allowed_hashes = 4;
}

message GenerateKeyResponse {
  KeyHandle handle = 1;
  Algorithm algorithm = 2;
  // public_key is the PKIX/DER (SubjectPublicKeyInfo) encoding.
  bytes public_key = 3;
}

message GetPublicKeyRequest {
  KeyHandle handle = 1;
}

message GetPublicKeyResponse {
  Algorithm algorithm = 1;
  bytes public_key = 2;
}

message SignRequest {
  KeyHandle handle = 1;
  // digest is the pre-computed message digest to sign. Signing a digest (rather
  // than a raw message) is the canonical signer operation: it matches
  // crypto.Signer/HSM semantics and is what X.509 CSR and certificate signing
  // require.
  bytes digest = 2;
  // hash identifies the algorithm that produced digest (needed for RSA).
  Hash hash = 3;
  RSAPadding rsa_padding = 4;
  // purpose is the usage class the caller asserts this signature is for. If the
  // key was created with a non-empty allowed_purposes set, the signer enforces
  // purpose membership and refuses a mismatch with FAILED_PRECONDITION (design
  // §4.5/§5.5). For an unconstrained key it is advisory and may be left
  // UNSPECIFIED.
  KeyPurpose purpose = 5;
}

message SignResponse {
  bytes signature = 1;
}

message DestroyKeyRequest {
  KeyHandle handle = 1;
}

message DestroyKeyResponse {}

message HealthRequest {}

message HealthResponse {
  enum Status {
    STATUS_UNSPECIFIED = 0;
    STATUS_SERVING = 1;
    STATUS_NOT_SERVING = 2;
    STATUS_DRAINING = 3;
  }
  Status status = 1;
}
