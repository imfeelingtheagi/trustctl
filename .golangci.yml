# golangci-lint v2 configuration.
#
# The standard linter set (errcheck, govet, ineffassign, staticcheck, unused) —
# the same set the project has always used — plus the architecture linter
# (tools/trustctllint) which runs separately via `make lint`. golangci-lint v2 is
# required for Go 1.25.
#
# No exclusions: errcheck is fully strict. Every ignored error is acknowledged
# explicitly at its call site (`_ = f()`), so a genuinely-dropped error is never
# silently muted by a name-pattern exclusion, and any new unchecked error fails
# the build.
version: "2"

linters:
  default: standard
