site_name: trustctl
site_description: Self-hosted control plane for every non-human identity.
repo_url: https://github.com/imfeelingtheagi/trustctl
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Current limitations: limitations.md
  - Install: install.md
  - Configuration: configuration.md
  - Audit & compliance: compliance.md
  - Observability: observability.md
  - Operations & resilience: operations.md
  - CLI: cli.md
  - Telemetry: telemetry.md
  - Troubleshooting: troubleshooting.md
  - Uninstall: uninstall.md
  - Runbooks:
      - Backup & disaster recovery: disaster-recovery.md
      - Migrations & upgrades: migrations.md
      - CA key ceremony: runbooks/key-ceremony.md
      - Incident response: runbooks/incident-response.md
  - Security:
      - Product threat model: security/threat-model.md
      - Vulnerability management: security/vulnerability-management.md
      - Supply chain: supply-chain.md
      - Signing service design: design/signing-service.md
      - Semantic query layer design: design/semantic-query-layer.md
  - Authoring guides:
      - Connectors: guides/connector-authoring.md
      - Plugins: guides/plugin-authoring.md
      - Certificate profiles: guides/profile-authoring.md
      - Device enrollment (EST): guides/est-enrollment.md
